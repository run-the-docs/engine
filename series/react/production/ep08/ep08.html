<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>
const W=1920,H=1080,CX=960,CY=540;
const BG='#0d0d1a',REACT='#61dafb',TEXT='#f8fafc',CODE_BG='#0d1117';
const GREEN='#22c55e',YELLOW='#eab308',RED='#ef4444',PURPLE='#a78bfa',ORANGE='#f97316';

let TIMING=[{"index":0,"text":"Your components need to show different things depending on conditions. React handles this with plain JavaScript.","start":2.0,"end":9.787},{"index":1,"text":"Start with if statements. A function component can return different JSX based on a prop.","start":10.167,"end":16.439},{"index":2,"text":"isPacked is true? Return the item with a checkmark. isPacked is false? Return it without. Two separate return statements.","start":16.819,"end":24.797},{"index":3,"text":"You can also return null. If isPacked is true, return null — the component renders nothing. It disappears from the output.","start":25.177,"end":33.22},{"index":4,"text":"But returning null is rare. Usually you conditionally include or exclude the component from the parent instead.","start":33.6,"end":41.237},{"index":5,"text":"For inline conditions, use the ternary operator. isPacked question mark, name plus checkmark, colon, name. One expression, two outcomes.","start":41.617,"end":51.111},{"index":6,"text":"Ternaries keep your JSX compact. But don't nest them — deeply nested ternaries are hard to read.","start":51.491,"end":58.061},{"index":7,"text":"There's an even shorter pattern: logical AND. isPacked ampersand ampersand, checkmark. If isPacked is true, render the checkmark. If false, render nothing.","start":58.441,"end":68.895},{"index":8,"text":"Watch out for a common trap. If the left side is zero, React renders the number zero — not nothing. Use a boolean condition, not a number.","start":69.275,"end":78.512},{"index":9,"text":"You can also assign JSX to a variable. Let itemContent equals name. Then, if isPacked, reassign it to name plus checkmark. Return the variable in your JSX.","start":78.892,"end":90.647},{"index":10,"text":"This variable approach is the most flexible. You can mix in any logic — if, else if, switch — before your return statement.","start":91.027,"end":99.133},{"index":11,"text":"Let's recap. Use if and return for completely different JSX. Use ternary for inline either-or choices.","start":99.513,"end":107.151},{"index":12,"text":"Use logical AND for conditionally including an element. Use variables when the logic gets complex.","start":107.531,"end":114.421},{"index":13,"text":"All of this is just JavaScript. No special React syntax. That's the point.","start":114.801,"end":120.071},{"index":14,"text":"Next up: rendering lists.","start":120.451,"end":122.456}];
let TOTAL_DURATION=126.836;

const ease={
  out:t=>1-Math.pow(1-t,3),
  spring:t=>{const c=(2*Math.PI)/2.5;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c)+1;}
};
function seg(t,s,e){return Math.max(0,Math.min(1,(t-s)/(e-s)));}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function drawGrid(c){c.strokeStyle='rgba(97,218,251,0.03)';c.lineWidth=1;for(let x=0;x<W;x+=80){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}for(let y=0;y<H;y+=80){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}}
function drawReactLogo(c,cx,cy,r,a,t){if(a<=0)return;c.save();c.globalAlpha=a;c.strokeStyle=REACT;c.lineWidth=r*0.06;c.shadowColor=REACT;c.shadowBlur=18*a;for(let i=0;i<3;i++){c.save();c.translate(cx,cy);c.rotate(i*Math.PI/3+t*0.4);c.beginPath();c.ellipse(0,0,r,r*0.38,0,0,Math.PI*2);c.stroke();c.restore();}c.fillStyle=REACT;c.shadowBlur=0;c.beginPath();c.arc(cx,cy,r*0.18,0,Math.PI*2);c.fill();c.restore();}
function drawCaption(c,t){let txt='';for(const s of TIMING){if(t>=s.start-0.1&&t<=s.end+0.3){txt=s.text;break;}}if(!txt)return;c.save();c.font='500 20px "JetBrains Mono",monospace';const tw=c.measureText(txt).width,pw=Math.min(tw+48,W-100);c.globalAlpha=0.9;c.fillStyle='rgba(0,0,0,0.85)';roundRect(c,CX-pw/2,968,pw,44,22);c.fill();c.globalAlpha=1;c.fillStyle=TEXT;c.textAlign='center';c.textBaseline='middle';let d=txt;while(c.measureText(d).width>pw-48&&d.length>10)d=d.slice(0,-1);if(d!==txt)d+='…';c.fillText(d,CX,990);c.restore();}
function drawFileBox(c,x,y,w,h,name,color,a){c.save();c.globalAlpha=a;c.fillStyle=CODE_BG;roundRect(c,x,y,w,h,12);c.fill();c.strokeStyle=color+'88';c.lineWidth=2;c.stroke();c.fillStyle=color+'33';roundRect(c,x,y-30,Math.min(220,name.length*12+20),30,6);c.fill();c.font='500 16px "JetBrains Mono",monospace';c.fillStyle=color;c.textAlign='left';c.textBaseline='middle';c.fillText(name,x+12,y-15);c.restore();}

// ─── Scene 1: Hook/Title (0–10s) ───
function drawScene1(c,t){
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  const lp=ease.spring(seg(t,2,3));drawReactLogo(c,CX,CY-130,130*lp,lp,t);
  const ta=ease.out(seg(t,2.5,3.5));
  if(ta>0){c.save();c.globalAlpha=ta;c.font='bold 90px "JetBrains Mono",monospace';c.fillStyle=REACT;c.textAlign='center';c.textBaseline='middle';c.shadowColor=REACT;c.shadowBlur=20;c.fillText('Conditional',CX,CY+60);c.fillText('Rendering',CX,CY+160);c.shadowBlur=0;c.restore();}
  const sa=ease.out(seg(t,3.3,4.1));
  if(sa>0){c.save();c.globalAlpha=sa;c.font='500 36px "JetBrains Mono",monospace';c.fillStyle=TEXT;c.textAlign='center';c.textBaseline='middle';c.fillText('Showing Different UI Based on Conditions',CX,CY+250);c.restore();}
  const ma=ease.out(seg(t,4.1,5));
  if(ma>0){c.save();c.globalAlpha=ma;c.font='400 28px "JetBrains Mono",monospace';c.fillStyle='#64748b';c.textAlign='center';c.textBaseline='middle';c.fillText('react.dev/learn  ·  Episode 8',CX,CY+310);c.restore();}
}

// ─── Scene 2: if/return pattern (10–25s) ───
function drawScene2(c,t){
  const s=10;
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.5));c.font='600 42px "JetBrains Mono",monospace';c.fillStyle=REACT;c.textAlign='center';c.textBaseline='middle';c.fillText('Pattern 1: if / return',CX,80);c.restore();

  // Code block
  const cp=ease.out(seg(t,s+0.5,s+1.5));
  if(cp>0){
    drawFileBox(c,200,150,1520,520,'Item.jsx',REACT,cp);
    c.save();c.globalAlpha=cp;c.font='500 24px "JetBrains Mono",monospace';c.textAlign='left';c.textBaseline='top';
    const lh=36,x0=230,y0=170;
    c.fillStyle='#c792ea';c.fillText('function',x0,y0);
    c.fillStyle=REACT;c.fillText(' Item',x0+130,y0);
    c.fillStyle=TEXT;c.fillText('({ name, isPacked }) {',x0+205,y0);

    // Highlight if block after seg 2 starts
    const hl=ease.out(seg(t,16.8,17.5));
    if(hl>0){c.save();c.globalAlpha=hl*0.12;c.fillStyle=GREEN;roundRect(c,220,y0+lh-4,1480,lh*3+8,6);c.fill();c.restore();}

    c.fillStyle=PURPLE;c.fillText('  if',x0,y0+lh);
    c.fillStyle=TEXT;c.fillText(' (isPacked) {',x0+60,y0+lh);
    c.fillStyle=PURPLE;c.fillText('    return',x0,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText(' <li>',x0+150,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('{name}',x0+215,y0+lh*2);
    c.fillStyle=GREEN;c.fillText(' ✅',x0+330,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText('</li>',x0+380,y0+lh*2);
    c.fillStyle=TEXT;c.fillText(';',x0+460,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('  }',x0,y0+lh*3);

    c.fillStyle=TEXT;c.fillText('',x0,y0+lh*4);
    c.fillStyle=PURPLE;c.fillText('  return',x0,y0+lh*5);
    c.fillStyle='#89ddff';c.fillText(' <li>',x0+120,y0+lh*5);
    c.fillStyle=TEXT;c.fillText('{name}',x0+185,y0+lh*5);
    c.fillStyle='#89ddff';c.fillText('</li>',x0+290,y0+lh*5);
    c.fillStyle=TEXT;c.fillText(';',x0+370,y0+lh*5);

    c.fillStyle='#c792ea';c.fillText('}',x0,y0+lh*7);
    c.restore();
  }

  // Visual demo boxes
  const dp=ease.spring(seg(t,17,18));
  if(dp>0){
    // isPacked=true result
    c.save();c.globalAlpha=dp;
    c.fillStyle='rgba(34,197,94,0.08)';roundRect(c,200,720,700,100,12);c.fill();
    c.strokeStyle=GREEN+'66';c.lineWidth=2;c.stroke();
    c.font='500 24px "JetBrains Mono",monospace';c.fillStyle=GREEN;c.textAlign='left';c.textBaseline='middle';
    c.fillText('isPacked={true}  →  ',230,770);
    c.fillStyle=TEXT;c.fillText('• Tesla Model 3 ✅',560,770);
    c.restore();

    // isPacked=false result
    c.save();c.globalAlpha=dp;
    c.fillStyle='rgba(97,218,251,0.06)';roundRect(c,1020,720,700,100,12);c.fill();
    c.strokeStyle=REACT+'44';c.lineWidth=2;c.stroke();
    c.font='500 24px "JetBrains Mono",monospace';c.fillStyle=REACT;c.textAlign='left';c.textBaseline='middle';
    c.fillText('isPacked={false}  →  ',1050,770);
    c.fillStyle=TEXT;c.fillText('• Charger',1410,770);
    c.restore();
  }
}

// ─── Scene 3: return null (25–42s) ───
function drawScene3(c,t){
  const s=25;
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.5));c.font='600 42px "JetBrains Mono",monospace';c.fillStyle=YELLOW;c.textAlign='center';c.textBaseline='middle';c.fillText('Returning null',CX,80);c.restore();

  const cp=ease.out(seg(t,s+0.5,s+1.5));
  if(cp>0){
    drawFileBox(c,200,150,1520,360,'Item.jsx',YELLOW,cp);
    c.save();c.globalAlpha=cp;c.font='500 26px "JetBrains Mono",monospace';c.textAlign='left';c.textBaseline='top';
    const lh=38,x0=230,y0=175;
    c.fillStyle='#c792ea';c.fillText('function',x0,y0);
    c.fillStyle=REACT;c.fillText(' Item',x0+138,y0);
    c.fillStyle=TEXT;c.fillText('({ name, isPacked }) {',x0+218,y0);

    // Highlight null return
    const hl=ease.out(seg(t,25.5,26.5));
    if(hl>0){c.save();c.globalAlpha=hl*0.15;c.fillStyle=YELLOW;roundRect(c,220,y0+lh-4,1480,lh*3+4,6);c.fill();c.restore();}

    c.fillStyle=PURPLE;c.fillText('  if',x0,y0+lh);
    c.fillStyle=TEXT;c.fillText(' (isPacked) {',x0+62,y0+lh);
    c.fillStyle=PURPLE;c.fillText('    return',x0,y0+lh*2);
    c.fillStyle=YELLOW;c.fillText(' null',x0+155,y0+lh*2);
    c.fillStyle=TEXT;c.fillText(';',x0+220,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('  }',x0,y0+lh*3);
    c.fillStyle=PURPLE;c.fillText('  return',x0,y0+lh*5);
    c.fillStyle='#89ddff';c.fillText(' <li>',x0+125,y0+lh*5);
    c.fillStyle=TEXT;c.fillText('{name}',x0+195,y0+lh*5);
    c.fillStyle='#89ddff';c.fillText('</li>',x0+300,y0+lh*5);
    c.fillStyle=TEXT;c.fillText(';',x0+380,y0+lh*5);
    c.fillStyle='#c792ea';c.fillText('}',x0,y0+lh*7);
    c.restore();
  }

  // Visual: what happens
  const vp=ease.spring(seg(t,27,28));
  if(vp>0){
    c.save();c.globalAlpha=vp;
    c.fillStyle='rgba(234,179,8,0.08)';roundRect(c,200,560,700,140,12);c.fill();
    c.strokeStyle=YELLOW+'66';c.lineWidth=2;c.stroke();
    c.font='600 24px "JetBrains Mono",monospace';c.fillStyle=YELLOW;c.textAlign='left';c.textBaseline='middle';
    c.fillText('isPacked={true}',230,600);
    c.font='500 28px "JetBrains Mono",monospace';c.fillStyle='#64748b';
    c.fillText('→  (nothing rendered)',230,650);
    c.restore();

    c.save();c.globalAlpha=vp;
    c.fillStyle='rgba(97,218,251,0.06)';roundRect(c,1020,560,700,140,12);c.fill();
    c.strokeStyle=REACT+'44';c.lineWidth=2;c.stroke();
    c.font='600 24px "JetBrains Mono",monospace';c.fillStyle=REACT;c.textAlign='left';c.textBaseline='middle';
    c.fillText('isPacked={false}',1050,600);
    c.font='500 28px "JetBrains Mono",monospace';c.fillStyle=TEXT;
    c.fillText('→  • Charger',1050,650);
    c.restore();
  }

  // Warning box for "rare"
  const wa=ease.out(seg(t,33.6,34.5));
  if(wa>0){
    c.save();c.globalAlpha=wa;
    c.fillStyle='rgba(234,179,8,0.06)';roundRect(c,200,750,1520,120,12);c.fill();
    c.strokeStyle=YELLOW+'55';c.lineWidth=2;c.stroke();
    c.font='bold 28px "JetBrains Mono",monospace';c.fillStyle=YELLOW;c.textAlign='center';c.textBaseline='middle';
    c.fillText('⚠️  Returning null is rare in practice',CX,790);
    c.font='400 22px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText('Usually exclude the component from the parent instead',CX,830);
    c.restore();
  }
}

// ─── Scene 4: Ternary operator (42–58s) ───
function drawScene4(c,t){
  const s=41.5;
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.5));c.font='600 42px "JetBrains Mono",monospace';c.fillStyle=GREEN;c.textAlign='center';c.textBaseline='middle';c.fillText('Pattern 2: Ternary Operator',CX,80);c.restore();

  const cp=ease.out(seg(t,s+0.5,s+1.5));
  if(cp>0){
    drawFileBox(c,200,150,1520,320,'Item.jsx',GREEN,cp);
    c.save();c.globalAlpha=cp;c.font='500 26px "JetBrains Mono",monospace';c.textAlign='left';c.textBaseline='top';
    const lh=38,x0=230,y0=175;
    c.fillStyle='#c792ea';c.fillText('function',x0,y0);
    c.fillStyle=REACT;c.fillText(' Item',x0+138,y0);
    c.fillStyle=TEXT;c.fillText('({ name, isPacked }) {',x0+218,y0);
    c.fillStyle=PURPLE;c.fillText('  return',x0,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText(' <li>',x0+125,y0+lh*2);
    // Ternary expression - highlight
    const hl=ease.out(seg(t,43,44));
    if(hl>0){c.save();c.globalAlpha=hl*0.12;c.fillStyle=GREEN;roundRect(c,x0+185,y0+lh*2-4,800,lh+8,4);c.fill();c.restore();}
    c.fillStyle=TEXT;c.fillText('{isPacked',x0+190,y0+lh*2);
    c.fillStyle=GREEN;c.fillText(' ? ',x0+345,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('name +',x0+395,y0+lh*2);
    c.fillStyle=GREEN;c.fillText("' ✅'",x0+510,y0+lh*2);
    c.fillStyle=GREEN;c.fillText(' : ',x0+595,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('name}',x0+645,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText('</li>',x0+760,y0+lh*2);
    c.fillStyle=TEXT;c.fillText(';',x0+840,y0+lh*2);
    c.fillStyle='#c792ea';c.fillText('}',x0,y0+lh*4);
    c.restore();
  }

  // Visual breakdown
  const bp=ease.spring(seg(t,44,45));
  if(bp>0){
    c.save();c.globalAlpha=bp;
    // condition
    c.fillStyle='rgba(97,218,251,0.08)';roundRect(c,150,530,500,100,12);c.fill();
    c.strokeStyle=REACT+'55';c.lineWidth=2;c.stroke();
    c.font='600 22px "JetBrains Mono",monospace';c.fillStyle=REACT;c.textAlign='center';c.textBaseline='middle';
    c.fillText('condition',400,560);
    c.font='500 20px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText('isPacked',400,595);
    // ? truthy
    c.fillStyle='rgba(34,197,94,0.08)';roundRect(c,710,530,500,100,12);c.fill();
    c.strokeStyle=GREEN+'55';c.lineWidth=2;c.stroke();
    c.font='600 22px "JetBrains Mono",monospace';c.fillStyle=GREEN;c.textAlign='center';
    c.fillText('? truthy',960,560);
    c.font='500 20px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText("name + ' ✅'",960,595);
    // : falsy
    c.fillStyle='rgba(249,115,22,0.08)';roundRect(c,1270,530,500,100,12);c.fill();
    c.strokeStyle=ORANGE+'55';c.lineWidth=2;c.stroke();
    c.font='600 22px "JetBrains Mono",monospace';c.fillStyle=ORANGE;c.textAlign='center';
    c.fillText(': falsy',1520,560);
    c.font='500 20px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText('name',1520,595);
    c.restore();
  }

  // Don't nest warning
  const wa=ease.out(seg(t,51.5,52.5));
  if(wa>0){
    c.save();c.globalAlpha=wa;
    c.fillStyle='rgba(234,179,8,0.06)';roundRect(c,200,690,1520,120,12);c.fill();
    c.strokeStyle=YELLOW+'55';c.lineWidth=2;c.stroke();
    c.font='bold 28px "JetBrains Mono",monospace';c.fillStyle=YELLOW;c.textAlign='center';c.textBaseline='middle';
    c.fillText("💡 Don't nest ternaries — they get hard to read",CX,730);
    c.font='400 22px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText('Extract into variables or use if/else for complex conditions',CX,770);
    c.restore();
  }
}

// ─── Scene 5: Logical AND (58–79s) ───
function drawScene5(c,t){
  const s=58;
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.5));c.font='600 42px "JetBrains Mono",monospace';c.fillStyle=PURPLE;c.textAlign='center';c.textBaseline='middle';c.fillText('Pattern 3: Logical && (AND)',CX,80);c.restore();

  const cp=ease.out(seg(t,s+0.5,s+1.5));
  if(cp>0){
    drawFileBox(c,200,150,1520,280,'Item.jsx',PURPLE,cp);
    c.save();c.globalAlpha=cp;c.font='500 26px "JetBrains Mono",monospace';c.textAlign='left';c.textBaseline='top';
    const lh=38,x0=230,y0=175;
    c.fillStyle='#c792ea';c.fillText('function',x0,y0);
    c.fillStyle=REACT;c.fillText(' Item',x0+138,y0);
    c.fillStyle=TEXT;c.fillText('({ name, isPacked }) {',x0+218,y0);
    c.fillStyle=PURPLE;c.fillText('  return',x0,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText(' <li>',x0+125,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('{name}',x0+190,y0+lh*2);
    // Highlight && part
    const hl=ease.out(seg(t,60,61));
    if(hl>0){c.save();c.globalAlpha=hl*0.15;c.fillStyle=PURPLE;roundRect(c,x0+285,y0+lh*2-4,420,lh+8,4);c.fill();c.restore();}
    c.fillStyle=TEXT;c.fillText(' {isPacked',x0+290,y0+lh*2);
    c.fillStyle=PURPLE;c.fillText(' && ',x0+455,y0+lh*2);
    c.fillStyle=GREEN;c.fillText("' ✅'",x0+520,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('}',x0+600,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText('</li>',x0+625,y0+lh*2);
    c.fillStyle=TEXT;c.fillText(';',x0+705,y0+lh*2);
    c.fillStyle='#c792ea';c.fillText('}',x0,y0+lh*4);
    c.restore();
  }

  // How it works
  const hp=ease.spring(seg(t,61,62));
  if(hp>0){
    c.save();c.globalAlpha=hp;
    // true case
    c.fillStyle='rgba(34,197,94,0.08)';roundRect(c,200,490,700,110,12);c.fill();
    c.strokeStyle=GREEN+'55';c.lineWidth=2;c.stroke();
    c.font='600 24px "JetBrains Mono",monospace';c.fillStyle=GREEN;c.textAlign='left';c.textBaseline='middle';
    c.fillText('true && "✅"',230,530);
    c.font='500 22px "JetBrains Mono",monospace';c.fillStyle=TEXT;
    c.fillText('→  renders the checkmark',230,565);
    // false case
    c.fillStyle='rgba(239,68,68,0.08)';roundRect(c,1020,490,700,110,12);c.fill();
    c.strokeStyle=RED+'55';c.lineWidth=2;c.stroke();
    c.font='600 24px "JetBrains Mono",monospace';c.fillStyle=RED;c.textAlign='left';
    c.fillText('false && "✅"',1050,530);
    c.font='500 22px "JetBrains Mono",monospace';c.fillStyle=TEXT;
    c.fillText('→  renders nothing',1050,565);
    c.restore();
  }

  // Zero gotcha warning
  const wa=ease.out(seg(t,69.3,70.3));
  if(wa>0){
    c.save();c.globalAlpha=wa;
    c.fillStyle='rgba(239,68,68,0.1)';roundRect(c,200,650,1520,220,16);c.fill();
    c.strokeStyle=RED+'88';c.lineWidth=3;c.stroke();
    c.font='bold 32px "JetBrains Mono",monospace';c.fillStyle=RED;c.textAlign='center';c.textBaseline='middle';
    c.fillText('⚠️  Watch out: the zero trap!',CX,700);
    // Bad example
    c.font='500 24px "JetBrains Mono",monospace';c.fillStyle=RED;c.textAlign='left';
    c.fillText('messageCount && <p>New messages</p>',300,750);
    c.font='400 20px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText('If messageCount is 0, React renders "0" — not nothing!',300,785);
    // Fix
    c.font='500 24px "JetBrains Mono",monospace';c.fillStyle=GREEN;
    c.fillText('messageCount > 0 && <p>New messages</p>',300,825);
    c.font='400 20px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText('Use a boolean expression on the left side',300,855);
    c.restore();
  }
}

// ─── Scene 6: Variable assignment (79–99s) ───
function drawScene6(c,t){
  const s=79;
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.5));c.font='600 42px "JetBrains Mono",monospace';c.fillStyle=ORANGE;c.textAlign='center';c.textBaseline='middle';c.fillText('Pattern 4: Variable Assignment',CX,80);c.restore();

  const cp=ease.out(seg(t,s+0.5,s+1.5));
  if(cp>0){
    drawFileBox(c,200,140,1520,460,'Item.jsx',ORANGE,cp);
    c.save();c.globalAlpha=cp;c.font='500 24px "JetBrains Mono",monospace';c.textAlign='left';c.textBaseline='top';
    const lh=34,x0=230,y0=165;
    c.fillStyle='#c792ea';c.fillText('function',x0,y0);
    c.fillStyle=REACT;c.fillText(' Item',x0+130,y0);
    c.fillStyle=TEXT;c.fillText('({ name, isPacked }) {',x0+205,y0);

    // Highlight assignment
    const hl=ease.out(seg(t,80,81));
    if(hl>0){c.save();c.globalAlpha=hl*0.12;c.fillStyle=ORANGE;roundRect(c,220,y0+lh*2-4,1480,lh+8,4);c.fill();c.restore();}

    c.fillStyle=PURPLE;c.fillText('  let',x0,y0+lh*2);
    c.fillStyle=TEXT;c.fillText(' itemContent = name;',x0+68,y0+lh*2);

    // Highlight if reassign
    const hl2=ease.out(seg(t,82,83));
    if(hl2>0){c.save();c.globalAlpha=hl2*0.12;c.fillStyle=GREEN;roundRect(c,220,y0+lh*4-4,1480,lh*3+8,4);c.fill();c.restore();}

    c.fillStyle=PURPLE;c.fillText('  if',x0,y0+lh*4);
    c.fillStyle=TEXT;c.fillText(' (isPacked) {',x0+58,y0+lh*4);
    c.fillStyle=TEXT;c.fillText("    itemContent = name + ' ✅';",x0,y0+lh*5);
    c.fillStyle=TEXT;c.fillText('  }',x0,y0+lh*6);

    c.fillStyle=PURPLE;c.fillText('  return',x0,y0+lh*8);
    c.fillStyle='#89ddff';c.fillText(' <li>',x0+115,y0+lh*8);
    c.fillStyle=TEXT;c.fillText('{itemContent}',x0+180,y0+lh*8);
    c.fillStyle='#89ddff';c.fillText('</li>',x0+380,y0+lh*8);
    c.fillStyle=TEXT;c.fillText(';',x0+455,y0+lh*8);
    c.fillStyle='#c792ea';c.fillText('}',x0,y0+lh*10);
    c.restore();
  }

  // Flexibility note
  const fp=ease.out(seg(t,91,92));
  if(fp>0){
    c.save();c.globalAlpha=fp;
    c.fillStyle='rgba(249,115,22,0.06)';roundRect(c,200,660,1520,160,12);c.fill();
    c.strokeStyle=ORANGE+'55';c.lineWidth=2;c.stroke();
    c.font='bold 28px "JetBrains Mono",monospace';c.fillStyle=ORANGE;c.textAlign='center';c.textBaseline='middle';
    c.fillText('Most flexible approach',CX,700);
    c.font='400 24px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';
    c.fillText('Mix in any logic — if, else if, switch',CX,745);
    c.fillText('before your return statement',CX,780);
    c.restore();
  }
}

// ─── Scene 7: Recap (99–120s) ───
function drawScene7(c,t){
  const s=99;
  c.fillStyle=BG;c.fillRect(0,0,W,H);
  const bg=c.createRadialGradient(CX,CY,50,CX,CY,700);bg.addColorStop(0,'rgba(97,218,251,0.08)');bg.addColorStop(1,'transparent');c.fillStyle=bg;c.fillRect(0,0,W,H);drawGrid(c);

  drawReactLogo(c,CX,CY-390,50,ease.out(seg(t,s,s+0.6)),t);
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.5));c.font='600 38px "JetBrains Mono",monospace';c.fillStyle=TEXT;c.textAlign='center';c.textBaseline='middle';c.fillText('4 Patterns for Conditional Rendering',CX,CY-290);c.restore();

  // 4 cards side by side
  const cards=[
    {title:'if / return',code:'if (isPacked)\n  return <li>{name} ✅</li>;',desc:'Completely different JSX',color:REACT,delay:0.5},
    {title:'Ternary ? :',code:'isPacked\n  ? name + " ✅"\n  : name',desc:'Inline either-or',color:GREEN,delay:1.0},
    {title:'Logical &&',code:'isPacked && " ✅"',desc:'Include or skip element',color:PURPLE,delay:1.5},
    {title:'Variable',code:'let content = name;\nif (isPacked)\n  content += " ✅";',desc:'Complex logic before return',color:ORANGE,delay:2.0}
  ];

  const cardW=380,cardH=340,gap=20,totalW=cardW*4+gap*3;
  const startX=CX-totalW/2;

  cards.forEach((card,i)=>{
    const cp=ease.spring(seg(t,s+card.delay,s+card.delay+0.6));
    if(cp<=0)return;
    const cx=startX+i*(cardW+gap);
    const cy=CY-220;
    c.save();c.globalAlpha=cp;c.translate(0,(1-cp)*30);

    c.fillStyle='rgba(13,17,23,0.9)';roundRect(c,cx,cy,cardW,cardH,16);c.fill();
    c.strokeStyle=card.color+'66';c.lineWidth=2;c.stroke();

    // Color accent bar
    c.fillStyle=card.color;roundRect(c,cx,cy,cardW,4,2);c.fill();

    // Title
    c.font='bold 24px "JetBrains Mono",monospace';c.fillStyle=card.color;c.textAlign='center';c.textBaseline='middle';
    c.fillText(card.title,cx+cardW/2,cy+40);

    // Code
    c.font='500 18px "JetBrains Mono",monospace';c.fillStyle=TEXT;c.textAlign='left';
    const lines=card.code.split('\n');
    lines.forEach((line,li)=>{
      c.fillText(line,cx+20,cy+90+li*28);
    });

    // Description
    c.font='400 18px "JetBrains Mono",monospace';c.fillStyle='#94a3b8';c.textAlign='center';
    c.fillText(card.desc,cx+cardW/2,cy+cardH-30);
    c.restore();
  });

  // "All just JavaScript" message
  const ja=ease.out(seg(t,114.8,115.8));
  if(ja>0){
    c.save();c.globalAlpha=ja;
    c.fillStyle='rgba(97,218,251,0.08)';roundRect(c,300,CY+200,1320,80,12);c.fill();
    c.strokeStyle=REACT+'55';c.lineWidth=2;c.stroke();
    c.font='bold 30px "JetBrains Mono",monospace';c.fillStyle=REACT;c.textAlign='center';c.textBaseline='middle';
    c.fillText('All just JavaScript. No special React syntax.',CX,CY+240);
    c.restore();
  }
}

// ─── Scene 8: Next up + Outro (120–127s) ───
function drawScene8(c,t){
  const s=120;
  c.fillStyle=BG;c.fillRect(0,0,W,H);
  const g=c.createRadialGradient(CX,CY,50,CX,CY,600);g.addColorStop(0,'rgba(97,218,251,0.15)');g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(0,0,W,H);drawGrid(c);

  const a=ease.out(seg(t,s,s+0.5));
  drawReactLogo(c,CX,CY-120,90,a,t);

  if(a>0){
    c.save();c.globalAlpha=a;
    c.font='bold 64px "JetBrains Mono",monospace';c.textAlign='center';c.textBaseline='middle';
    c.shadowColor=REACT;c.shadowBlur=25;c.fillStyle=REACT;
    c.fillText('Next: Rendering Lists',CX,CY+40);
    c.shadowBlur=0;

    c.font='400 34px "JetBrains Mono",monospace';c.fillStyle='#64748b';
    c.fillText('Technical docs. Made watchable.',CX,CY+115);

    c.font='500 24px "JetBrains Mono",monospace';c.fillStyle=REACT;
    c.fillText('react  ·  ep 8  ·  conditional rendering',CX,CY+175);
    c.restore();
  }

  // Fade to black at end
  const fo=seg(t,TOTAL_DURATION-2,TOTAL_DURATION);
  if(fo>0){c.globalAlpha=fo;c.fillStyle='#000';c.fillRect(0,0,W,H);c.globalAlpha=1;}
}

const ST=[0,10,25,41.5,58,79,99,120];
const SF=[drawScene1,drawScene2,drawScene3,drawScene4,drawScene5,drawScene6,drawScene7,drawScene8];

window.renderFrame=function(fi){
  const t=fi/30,c=document.getElementById('c').getContext('2d');c.clearRect(0,0,W,H);
  let si=0;for(let i=1;i<ST.length;i++){if(t>=ST[i])si=i;else break;}
  SF[si](c,t);
  // Cross-fade transitions
  for(let i=1;i<ST.length;i++){const xf=ST[i];if(t>=xf&&t<xf+0.4){const ov=seg(t,xf,xf+0.4);c.globalAlpha=ov;c.fillStyle=BG;c.fillRect(0,0,W,H);c.globalAlpha=1;SF[i](c,t);break;}}
  drawCaption(c,t);
  // Final fade to black
  if(t>TOTAL_DURATION-1.5){c.globalAlpha=seg(t,TOTAL_DURATION-1,TOTAL_DURATION);c.fillStyle='#000';c.fillRect(0,0,W,H);c.globalAlpha=1;}
};
window.setTiming=function(s,d){TIMING=s;TOTAL_DURATION=d;};
</script>

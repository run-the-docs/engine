<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#0d0d1a;width:1920px;height:1080px;overflow:hidden;}canvas{display:block;}</style>

<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>
const W=1920,H=1080,CX=960,CY=540;
const BG='#0d0d1a',REACT='#61dafb',TEXT='#f8fafc',CODE_BG='#0d1117';
const GREEN='#22c55e',YELLOW='#eab308',RED='#ef4444',PURPLE='#a78bfa',ORANGE='#f97316';

let TIMING=[{"index":0,"text":"React can render lists from arrays. You need JavaScript\u2019s map method \u2014 that\u2019s it.","start":2.0,"end":7.397},{"index":1,"text":"Call array dot map, pass a function, return JSX. React renders one element per item.","start":7.777,"end":14.455},{"index":2,"text":"Each list item needs a key prop. Keys help React track which items changed, were added, or removed.","start":14.835,"end":21.789},{"index":3,"text":"Keys must be unique among siblings. They don\u2019t need to be globally unique \u2014 just within that list.","start":22.169,"end":28.463},{"index":4,"text":"Use stable IDs from your data as keys. Database IDs are ideal.","start":28.843,"end":34.091},{"index":5,"text":"Don\u2019t use array indexes as keys unless the list never changes order. Index keys break when items move.","start":34.471,"end":42.193},{"index":6,"text":"Never use Math dot random as a key. It changes every render and destroys performance.","start":42.573,"end":48.717},{"index":7,"text":"Keys are not passed as props. If your component needs the ID, pass it as a separate prop with a different name.","start":49.097,"end":56.585},{"index":8,"text":"You can filter and map together. Call array dot filter first, then dot map on the result.","start":56.965,"end":63.195},{"index":9,"text":"JSX lets you embed the whole map expression inside curly braces, right in the return statement.","start":63.575,"end":70.7},{"index":10,"text":"If your list items need more than one DOM element, wrap them in a Fragment. Fragments let you add a key without adding extra DOM nodes.","start":71.08,"end":80.765},{"index":11,"text":"Nested lists work the same way. Map inside map, each with its own key.","start":81.145,"end":86.159},{"index":12,"text":"React shows a warning in the console if keys are missing. Take it seriously \u2014 it means list updates will be slow or incorrect.","start":86.539,"end":94.88},{"index":13,"text":"Let\u2019s recap. Use map to render lists. Give every item a stable key. Avoid indexes and random values.","start":95.26,"end":102.641},{"index":14,"text":"Next up: keeping components pure.","start":103.021,"end":105.496}];
let TOTAL_DURATION=109.496;

const ease={
  out:t=>1-Math.pow(1-t,3),
  in:t=>t*t*t,
  inOut:t=>t<0.5?4*t*t*t:(1-Math.pow(-2*t+2,3)/2),
  spring:t=>{const c=(2*Math.PI)/2.5;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c)+1;}
};
function seg(t,s,e){return Math.max(0,Math.min(1,(t-s)/(e-s)));}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function drawGrid(c){c.strokeStyle='rgba(97,218,251,0.03)';c.lineWidth=1;for(let x=0;x<W;x+=80){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}for(let y=0;y<H;y+=80){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}}
function drawReactLogo(c,cx,cy,r,a,t){if(a<=0)return;c.save();c.globalAlpha=a;c.strokeStyle=REACT;c.lineWidth=r*0.06;c.shadowColor=REACT;c.shadowBlur=18*a;for(let i=0;i<3;i++){c.save();c.translate(cx,cy);c.rotate(i*Math.PI/3+t*0.4);c.beginPath();c.ellipse(0,0,r,r*0.38,0,0,Math.PI*2);c.stroke();c.restore();}c.fillStyle=REACT;c.shadowBlur=0;c.beginPath();c.arc(cx,cy,r*0.18,0,Math.PI*2);c.fill();c.restore();}
function drawCaption(c,t){let txt='';for(const s of TIMING){if(t>=s.start-0.1&&t<=s.end+0.3){txt=s.text;break;}}if(!txt)return;c.save();c.font='500 20px "JetBrains Mono",monospace';const tw=c.measureText(txt).width,pw=Math.min(tw+48,W-100);c.globalAlpha=0.9;c.fillStyle='rgba(0,0,0,0.85)';roundRect(c,CX-pw/2,968,pw,44,22);c.fill();c.globalAlpha=1;c.fillStyle=TEXT;c.textAlign='center';c.textBaseline='middle';let d=txt;while(c.measureText(d).width>pw-48&&d.length>10)d=d.slice(0,-1);if(d!==txt)d+='…';c.fillText(d,CX,990);c.restore();}
function drawCodeBox(c,x,y,w,h,title,color,alpha){c.save();c.globalAlpha=alpha;c.fillStyle=CODE_BG;roundRect(c,x,y,w,h,12);c.fill();c.strokeStyle=color+'66';c.lineWidth=2;c.stroke();if(title){c.fillStyle=color+'22';roundRect(c,x,y-32,Math.min(240,title.length*13+20),32,6);c.fill();c.font='500 17px "JetBrains Mono",monospace';c.fillStyle=color;c.textAlign='left';c.textBaseline='middle';c.fillText(title,x+12,y-16);}c.restore();}

// Scene 1: Title (0–10s)
function drawScene1(c,t){
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  const lp=ease.spring(seg(t,1,2.2));
  drawReactLogo(c,CX,CY-150,120*lp,lp,t);
  const ta=ease.out(seg(t,1.5,2.8));
  if(ta>0){
    c.save();c.globalAlpha=ta;
    c.font='bold 96px "JetBrains Mono",monospace';c.fillStyle=REACT;
    c.textAlign='center';c.textBaseline='middle';
    c.shadowColor=REACT;c.shadowBlur=24;
    c.fillText('Rendering Lists',CX,CY+60);
    c.shadowBlur=0;c.restore();
  }
  const sa=ease.out(seg(t,2.5,3.5));
  if(sa>0){
    c.save();c.globalAlpha=sa;
    c.font='500 34px "JetBrains Mono",monospace';c.fillStyle=TEXT;
    c.textAlign='center';c.textBaseline='middle';
    c.fillText('Using .map() to Transform Arrays into JSX',CX,CY+170);
    c.restore();
  }
  const ma=ease.out(seg(t,3.2,4.2));
  if(ma>0){
    c.save();c.globalAlpha=ma;
    c.font='400 26px "JetBrains Mono",monospace';c.fillStyle='#64748b';
    c.textAlign='center';c.textBaseline='middle';
    c.fillText('react.dev/learn  ·  Episode 9',CX,CY+235);
    c.restore();
  }
}

    c.fillStyle=TEXT;c.fillText('  { id: ',x0,y0+lh*2);c.fillStyle=YELLOW;c.fillText('2',x0+120,y0+lh*2);c.fillStyle=TEXT;c.fillText(', title: ',x0+140,y0+lh*2);c.fillStyle='#89ddff';c.fillText('"Garlic"',x0+250,y0+lh*2);c.fillStyle=TEXT;c.fillText('   },',x0+390,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('  { id: ',x0,y0+lh*3);c.fillStyle=YELLOW;c.fillText('3',x0+120,y0+lh*3);c.fillStyle=TEXT;c.fillText(', title: ',x0+140,y0+lh*3);c.fillStyle='#89ddff';c.fillText('"Apple"',x0+250,y0+lh*3);c.fillStyle=TEXT;c.fillText('   },',x0+390,y0+lh*3);
    c.fillStyle=TEXT;c.fillText('];',x0,y0+lh*4);

  // Arrow
  const arrowP=ease.out(seg(t,s+2,s+3));

    c.setLineDash([]);
    c.fillStyle=REACT+'88';
    c.beginPath();c.moveTo(875,280);c.lineTo(855,268);c.lineTo(855,292);c.closePath();c.fill();
    c.restore();

  // .map() result on right
  const mp=ease.out(seg(t,s+2,s+3.5));
  if(mp>0){
    drawCodeBox(c,880,120,960,640,'List component + .map()',REACT,mp);

    c.textAlign='left';c.textBaseline='top';
    const lh=36,x0=908,y0=140;
    c.fillStyle='#c792ea';c.fillText('function',x0,y0);c.fillStyle=REACT;c.fillText(' List',x0+130,y0);c.fillStyle=TEXT;c.fillText('() {',x0+190,y0);
    c.fillStyle=PURPLE;c.fillText('  return',x0,y0+lh);c.fillStyle=TEXT;c.fillText(' (',x0+120,y0+lh);
    c.fillStyle='#89ddff';c.fillText('    <ul>',x0,y0+lh*2);

    // Highlight .map() call
    const mhl=ease.out(seg(t,14.5,15.5));
    if(mhl>0){c.save();c.globalAlpha=mhl*0.15;c.fillStyle=REACT;roundRect(c,x0-4,y0+lh*3-4,900,lh*3+8,6);c.fill();c.restore();}

    c.fillStyle=TEXT;c.fillText('      {products',x0,y0+lh*3);
    c.fillStyle=REACT;c.fillText('.map',x0+220,y0+lh*3);
    c.fillStyle=TEXT;c.fillText('(',x0+300,y0+lh*3);
    c.fillStyle=ORANGE;c.fillText('item',x0+320,y0+lh*3);
    c.fillStyle=TEXT;c.fillText(' => (',x0+390,y0+lh*3);
    c.fillStyle='#89ddff';c.fillText('        <li',x0,y0+lh*4);

    // key prop highlight
    const khl=ease.out(seg(t,14.8,15.8));
    if(khl>0){c.save();c.globalAlpha=khl;c.font='500 22px "JetBrains Mono",monospace';c.textAlign='left';c.textBaseline='top';c.fillStyle=YELLOW;c.fillText(' key',x0+148,y0+lh*4);c.fillStyle=TEXT;c.fillText('={',x0+210,y0+lh*4);c.fillStyle=ORANGE;c.fillText('item',x0+244,y0+lh*4);c.fillStyle=TEXT;c.fillText('.id}',x0+296,y0+lh*4);c.restore();}

    c.fillStyle='#89ddff';c.fillText('        >',x0,y0+lh*5);
    c.fillStyle=TEXT;c.fillText('          {',x0,y0+lh*6);c.fillStyle=ORANGE;c.fillText('item',x0+88,y0+lh*6);c.fillStyle=TEXT;c.fillText('.title}',x0+140,y0+lh*6);
    c.fillStyle='#89ddff';c.fillText('        </li>',x0,y0+lh*7);
    c.fillStyle=TEXT;c.fillText('      ))}',x0,y0+lh*8);
    c.fillStyle='#89ddff';c.fillText('    </ul>',x0,y0+lh*9);
    c.fillStyle=TEXT;c.fillText('  );',x0,y0+lh*10);
    c.fillStyle='#c792ea';c.fillText('}',x0,y0+lh*11);
    c.restore();
  }

  // Rendered list output at bottom left
  const op=ease.out(seg(t,s+4,s+5));
  if(op>0){
    drawCodeBox(c,80,470,680,260,'rendered output',GREEN,op);
    c.save();c.globalAlpha=op;c.font='500 22px "JetBrains Mono",monospace';
    c.textAlign='left';c.textBaseline='top';
    const lh=36,x0=108,y0=490;
    c.fillStyle='#89ddff';c.fillText('<ul>',x0,y0);
    c.fillStyle=TEXT;c.fillText('  <li>Cabbage</li>',x0,y0+lh);
    c.fillStyle=TEXT;c.fillText('  <li>Garlic</li>',x0,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('  <li>Apple</li>',x0,y0+lh*3);
    c.fillStyle='#89ddff';c.fillText('</ul>',x0,y0+lh*4);
    c.restore();
  }
}

// Scene 3: Keys — stable IDs good, indexes bad, Math.random worst (25–45s)
// Sentences 2,3,4,5,6
function drawScene3(c,t){
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  const s=25;
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.7));
  c.font='600 40px "JetBrains Mono",monospace';c.fillStyle=REACT;
  c.textAlign='center';c.textBaseline='middle';
  c.fillText('Choosing the Right Key',CX,72);c.restore();

  // Column headers
  const hdr=ease.out(seg(t,s+0.5,s+1.5));
  if(hdr>0){
    c.save();c.globalAlpha=hdr;
    c.font='bold 28px "JetBrains Mono",monospace';c.textAlign='center';c.textBaseline='middle';
    // Good column
    c.fillStyle=GREEN;c.fillText('✅ Stable ID',380,130);
    // Caution column
    c.fillStyle=YELLOW;c.fillText('⚠️ Index',960,130);
    // Bad column
    c.fillStyle=RED;c.fillText('❌ Math.random()',1540,130);
    c.restore();
  }

  // Stable ID column
  const col1=ease.out(seg(t,s+1,s+2.5));
  if(col1>0){
    drawCodeBox(c,80,160,560,340,'database id',GREEN,col1);
    c.save();c.globalAlpha=col1;c.font='500 20px "JetBrains Mono",monospace';
    c.textAlign='left';c.textBaseline='top';
    const lh=32,x0=108,y0=178;
    c.fillStyle=TEXT;c.fillText('products.map(',x0,y0);
    c.fillStyle=ORANGE;c.fillText('item',x0,y0+lh);
    c.fillStyle=TEXT;c.fillText(' => (',x0+72,y0+lh);
    c.fillStyle='#89ddff';c.fillText('  <li',x0,y0+lh*2);
    c.fillStyle=YELLOW;c.fillText(' key',x0+80,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('={',x0+140,y0+lh*2);
    c.fillStyle=GREEN;c.fillText('item.id',x0+172,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('}',x0+280,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText('  >',x0,y0+lh*3);
    c.fillStyle=TEXT;c.fillText('{item.title}',x0,y0+lh*4);
    c.fillStyle='#89ddff';c.fillText('  </li>',x0,y0+lh*5);
    c.fillStyle=TEXT;c.fillText('))',x0,y0+lh*6);
    c.restore();

    // Stable badge
    const b1=ease.out(seg(t,s+3,s+4));
    if(b1>0){
      c.save();c.globalAlpha=b1;c.fillStyle=GREEN+'22';roundRect(c,80,530,560,80,12);c.fill();
      c.strokeStyle=GREEN+'88';c.lineWidth=2;c.stroke();
      c.font='bold 24px "JetBrains Mono",monospace';c.fillStyle=GREEN;c.textAlign='center';c.textBaseline='middle';
      c.fillText('Stable across re-renders',360,570);c.restore();

  }

  // Index column
  const col2=ease.out(seg(t,s+3.5,s+5));
  if(col2>0){
    drawCodeBox(c,680,160,560,340,'array index',YELLOW,col2);
    c.save();c.globalAlpha=col2;c.font='500 20px "JetBrains Mono",monospace';
    c.textAlign='left';c.textBaseline='top';
    const lh=32,x0=708,y0=178;
    c.fillStyle=TEXT;c.fillText('products.map(',x0,y0);
    c.fillStyle=ORANGE;c.fillText('(item,',x0,y0+lh);
    c.fillStyle=YELLOW;c.fillText(' index',x0+80,y0+lh);
    c.fillStyle=TEXT;c.fillText(') => (',x0+160,y0+lh);
    c.fillStyle='#89ddff';c.fillText('  <li',x0,y0+lh*2);
    c.fillStyle=YELLOW;c.fillText(' key',x0+80,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('={',x0+140,y0+lh*2);
    c.fillStyle=YELLOW;c.fillText('index',x0+172,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('}',x0+250,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText('  >',x0,y0+lh*3);
    c.fillStyle=TEXT;c.fillText('{item.title}',x0,y0+lh*4);
    c.fillStyle='#89ddff';c.fillText('  </li>',x0,y0+lh*5);
    c.fillStyle=TEXT;c.fillText('))',x0,y0+lh*6);
    c.restore();

    // Warning badge
    const b2=ease.out(seg(t,s+5,s+6));
    if(b2>0){
      c.save();c.globalAlpha=b2;c.fillStyle=YELLOW+'22';roundRect(c,680,530,560,80,12);c.fill();
      c.strokeStyle=YELLOW+'88';c.lineWidth=2;c.stroke();
      c.font='bold 22px "JetBrains Mono",monospace';c.fillStyle=YELLOW;c.textAlign='center';c.textBaseline='middle';
      c.fillText('Breaks when items reorder',960,570);c.restore();
    }
  }

  // Math.random column
  const col3=ease.out(seg(t,s+7,s+8.5));
  if(col3>0){
    drawCodeBox(c,1280,160,560,340,'Math.random()',RED,col3);
    c.save();c.globalAlpha=col3;c.font='500 20px "JetBrains Mono",monospace';
    c.textAlign='left';c.textBaseline='top';
    const lh=32,x0=1308,y0=178;
    c.fillStyle=TEXT;c.fillText('products.map(',x0,y0);
    c.fillStyle=ORANGE;c.fillText('item',x0,y0+lh);
    c.fillStyle=TEXT;c.fillText(' => (',x0+72,y0+lh);
    c.fillStyle='#89ddff';c.fillText('  <li',x0,y0+lh*2);
    c.fillStyle=YELLOW;c.fillText(' key',x0+80,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('={',x0+140,y0+lh*2);
    c.fillStyle=RED;c.fillText('Math.random()',x0+172,y0+lh*2);
    c.fillStyle=TEXT;c.fillText('}',x0+370,y0+lh*2);
    c.fillStyle='#89ddff';c.fillText('  >',x0,y0+lh*3);
    c.fillStyle=TEXT;c.fillText('{item.title}',x0,y0+lh*4);
    c.fillStyle='#89ddff';c.fillText('  </li>',x0,y0+lh*5);
    c.fillStyle=TEXT;c.fillText('))',x0,y0+lh*6);
    c.restore();

    // Error badge
    const b3=ease.out(seg(t,s+9,s+10));
    if(b3>0){
      c.save();c.globalAlpha=b3;c.fillStyle=RED+'22';roundRect(c,1280,530,560,80,12);c.fill();
      c.strokeStyle=RED+'88';c.lineWidth=2;c.stroke();
      c.font='bold 22px "JetBrains Mono",monospace';c.fillStyle=RED;c.textAlign='center';c.textBaseline='middle';
      c.fillText('Destroys performance!',1560,570);c.restore();
    }
  }

  // Scope note — keys unique among siblings
  const scope=ease.out(seg(t,s+5,s+6.5));
  if(scope>0){
    c.save();c.globalAlpha=scope;
    c.fillStyle='rgba(97,218,251,0.08)';
    roundRect(c,80,640,1760,100,14);c.fill();
    c.strokeStyle=REACT+'44';c.lineWidth=2;c.stroke();

}

// Scene 4: Keys not props (45–70s) — sentences 7
function drawScene4(c,t){
  c.fillStyle=BG;c.fillRect(0,0,W,H);drawGrid(c);
  const s=45;
  c.save();c.globalAlpha=ease.out(seg(t,s,s+0.7));
  c.font='600 40px "JetBrains Mono",monospace';c.fillStyle=REACT;
  c.textAlign='center';c.textBaseline='middle';
  c.fillText('key is Special — Not a Prop',CX,72);c.restore();

  // Wrong: trying to use key as prop
  const w=ease.out(seg(t,s+1,s+2.5));
  if(w>0){
    drawCodeBox(c,80,120,840,400,'❌ key is not passed as prop',RED,w);
    c.save();c.globalAlpha=w;c.font='500 22px "JetBrains Mono",monospace';
    c.textAlign='left';c.textBaseline='top';
    const lh=36,x0=110,y0=142;
    // Inside Item component trying to read props.key
    c.fillStyle='#c792ea';c.fillText('function',x0,y0);c.fillStyle=REACT;c.fillText(' Item',x0+130,y0);c.fillStyle=TEXT;c.fillText('({ key }) {',x0+190,y0);

    // Cross out the key destructure
    const xa=ease.out(seg(t,s+2,s+2.5));
    if(xa>0){

    c.textAlign='center';c.textBaseline='middle';
    c.fillText('Episode 10  ·  react.dev/learn',CX,CY+220);
    c.restore();
  }
}

window.renderFrame = function(frameIndex){
  const ctx=document.getElementById('c').getContext('2d');
  const t=frameIndex/30;

  // Scene routing by time
  if(t<10) drawScene1(ctx,t);
  else if(t<25) drawScene2(ctx,t);
  else if(t<45) drawScene3(ctx,t);
  else if(t<70) drawScene4(ctx,t);
  else if(t<85) drawScene5(ctx,t);
  else if(t<100) drawScene6(ctx,t);
  else if(t<103) drawScene7(ctx,t);
  else drawScene8(ctx,t);

  drawCaption(ctx,t);
};

// Start at frame 0
renderFrame(0);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; width: 1920px; height: 1080px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
canvas { display: block; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>
const W = 1920, H = 1080, CX = 960, CY = 540;
const BG = '#0a0a0a';
const GRAD1 = '#1a1a2e';
const GRAD2 = '#16213e';
const ACCENT = '#0f3460';
const HIGHLIGHT = '#e94560';
const TEXT = '#eee';
const CODE_BG = '#141423';
const CODE_TEXT = '#90ee90';
const BORDER = '#444';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Exact timing from Kokoro TTS
const TIMING = [
  {start: 2.0, end: 5.6693, text: "React is built on components. Let's learn what they are."},
  {start: 6.0693, end: 10.144, text: "A component is a reusable piece of the user interface."},
  {start: 10.544, end: 14.896, text: "It can be as small as a button, or as large as an entire page."},
  {start: 15.296, end: 20.3307, text: "In React, components are just JavaScript functions that return markup."},
  {start: 20.7307, end: 26.384, text: "Here's a button component. It's a function called MyButton that returns a button element."},
  {start: 26.784, end: 31.84, text: "To use your component, you reference it like any other JSX element."},
  {start: 32.24, end: 39.152, text: "Just make sure to capitalize the first letter. That tells React it's a component, not an HTML tag."},
  {start: 39.552, end: 48.5547, text: "You can use the same component multiple times, and you can nest components inside other components to build complex user interfaces."},
  {start: 48.9547, end: 52.752, text: "Components are the building blocks of every React app."},
  {start: 53.152, end: 56.3307, text: "Start with functions, and you can build anything."},
  {start: 56.7307, end: 60.976, text: "Next episode: learn about Props to pass data to your components."},
];

const ease = {
  out: function(t) { return 1 - Math.pow(1-t, 3); },
  inOut: function(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; },
  spring: function(t) {
    if(t===0) return 0; if(t===1) return 1;
    const c4 = (2*Math.PI)/2.5;
    return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
  },
};

function seg(t, start, end) {
  return Math.max(0, Math.min(1, (t - start) / (end - start)));
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function setFont(ctx, size, weight) {
  weight = weight || '400';
  ctx.font = weight + ' ' + size + 'px -apple-system, BlinkMacSystemFont, sans-serif';
}

function renderFrame(frameNum) {
  const t = frameNum / 30;
  
  // Background
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, GRAD1);
  grad.addColorStop(1, GRAD2);
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.5;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // === SCENE 1: INTRO (before TIMING[0]) ===
  const introAlpha = t < TIMING[0].start ? ease.out(seg(t, 0, TIMING[0].start - 0.5)) : Math.max(0, 1 - ease.out(seg(t, TIMING[0].start, TIMING[0].start + 0.3)));
  
  if(introAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = introAlpha;
    setFont(ctx, 120, '700');
    ctx.fillStyle = HIGHLIGHT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('React', CX, CY - 80);
    
    setFont(ctx, 64, '400');
    ctx.fillStyle = TEXT;
    ctx.fillText('Your First Component', CX, CY + 80);
    ctx.restore();
  }

  // === SCENE 2: WHAT IS COMPONENT (SEG 0-2) ===
  const whatStart = TIMING[0].end;
  const whatEnd = TIMING[2].end;
  const whatAlpha = ease.out(seg(t, whatStart - 0.2, whatStart + 0.3)) * (t < whatEnd ? 1 : Math.max(0, 1 - ease.out(seg(t, whatEnd, whatEnd + 0.3))));
  
  if(whatAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = whatAlpha;
    
    setFont(ctx, 56, '600');
    ctx.fillStyle = TEXT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('What is a component?', 100, 100);
    
    const cardAlpha = ease.spring(seg(t, whatStart, whatStart + 0.5));
    ctx.globalAlpha = whatAlpha * cardAlpha;
    roundRect(ctx, 120, 250, 1680, 500, 16);
    ctx.fillStyle = hexToRgba(CODE_BG, 0.95);
    ctx.fill();
    ctx.strokeStyle = hexToRgba(HIGHLIGHT, 0.6);
    ctx.lineWidth = 2;
    ctx.stroke();
    
    setFont(ctx, 48, '400');
    ctx.fillStyle = TEXT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.globalAlpha = whatAlpha * cardAlpha;
    ctx.fillText('A reusable piece of the UI', 200, 320);
    ctx.fillText('Can be as small as a button', 200, 410);
    ctx.fillText('Or as large as an entire page', 200, 500);
    ctx.fillText('Just a JavaScript function', 200, 590);
    
    ctx.restore();
  }

  // === SCENE 3: CODE EXAMPLE (SEG 3-6) ===
  const codeStart = TIMING[3].start;
  const codeEnd = TIMING[6].end;
  const codeAlpha = ease.out(seg(t, codeStart - 0.2, codeStart + 0.3)) * (t < codeEnd ? 1 : Math.max(0, 1 - ease.out(seg(t, codeEnd, codeEnd + 0.3))));
  
  if(codeAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = codeAlpha;
    
    setFont(ctx, 56, '600');
    ctx.fillStyle = TEXT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('Your First Component', 100, 100);
    
    const boxAlpha = ease.spring(seg(t, codeStart, codeStart + 0.5));
    ctx.globalAlpha = codeAlpha * boxAlpha;
    roundRect(ctx, 150, 260, 1620, 600, 12);
    ctx.fillStyle = hexToRgba(CODE_BG, 0.98);
    ctx.fill();
    ctx.strokeStyle = BORDER;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    setFont(ctx, 28, '400');
    ctx.fillStyle = CODE_TEXT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const lines = [
      'function MyButton() {',
      '  return <button>Click me</button>',
      '}',
      '',
      'export default function App() {',
      '  return <MyButton />',
      '}'
    ];
    lines.forEach((line, i) => {
      ctx.fillText(line, 220, 310 + i * 50);
    });
    
    ctx.restore();
  }

  // === SCENE 4: NESTING (SEG 7-9) ===
  const nestStart = TIMING[7].start;
  const nestEnd = TIMING[9].end;
  const nestAlpha = ease.out(seg(t, nestStart - 0.2, nestStart + 0.3)) * (t < nestEnd ? 1 : Math.max(0, 1 - ease.out(seg(t, nestEnd, nestEnd + 0.3))));
  
  if(nestAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = nestAlpha;
    
    setFont(ctx, 56, '600');
    ctx.fillStyle = TEXT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('Nest Components', CX, 80);
    
    const nestBoxAlpha = ease.spring(seg(t, nestStart, nestStart + 0.5));
    ctx.globalAlpha = nestAlpha * nestBoxAlpha;
    roundRect(ctx, 150, 250, 1620, 550, 12);
    ctx.fillStyle = hexToRgba(CODE_BG, 0.98);
    ctx.fill();
    ctx.strokeStyle = BORDER;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    setFont(ctx, 26, '400');
    ctx.fillStyle = CODE_TEXT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const nestLines = [
      'export default function App() {',
      '  return (',
      '    <div>',
      '      <MyButton />',
      '      <MyButton />',
      '      <MyButton />',
      '    </div>',
      '  )',
      '}'
    ];
    nestLines.forEach((line, i) => {
      ctx.fillText(line, 220, 300 + i * 45);
    });
    
    ctx.restore();
  }

  // === SCENE 5: RECAP (SEG 10 - END) ===
  const recapStart = TIMING[10].start;
  const recapAlpha = ease.out(seg(t, recapStart - 0.2, recapStart + 0.3));
  
  if(recapAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = recapAlpha;
    
    const bgGlow = ctx.createRadialGradient(CX, CY, 0, CX, CY, 600);
    bgGlow.addColorStop(0, hexToRgba(HIGHLIGHT, 0.1));
    bgGlow.addColorStop(1, hexToRgba(HIGHLIGHT, 0));
    ctx.fillStyle = bgGlow;
    ctx.fillRect(0, 0, W, H);
    
    setFont(ctx, 72, '700');
    ctx.fillStyle = TEXT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Components are the building blocks', CX, CY - 60);
    
    setFont(ctx, 56, '400');
    ctx.fillStyle = HIGHLIGHT;
    ctx.fillText('of every React app', CX, CY + 40);
    
    setFont(ctx, 40, '400');
    ctx.fillStyle = TEXT;
    ctx.fillText('Next: Learn about Props', CX, CY + 180);
    
    ctx.restore();
  }
}

window.renderFrame = renderFrame;
</script>
</body>
</html>

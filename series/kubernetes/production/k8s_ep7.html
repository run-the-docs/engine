<script>
const W = 1920, H = 1080, CX = 960, CY = 540;
const BG     = '#080810';
const ACCENT  = '#326CE5';
const ACCENT2 = '#60a5fa';
const TEXT    = '#f8fafc';
const CODE_BG = '#0d1117';
const GREEN   = '#22c55e';
const YELLOW  = '#eab308';
const RED     = '#ef4444';
const SUBTLE  = '#334155';

let TIMING = [];
let TOTAL_DURATION = 69.4;

const ease = {
  out:    t => 1 - Math.pow(1-t, 3),
  inOut:  t => t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,
  spring: t => {
    if(t===0) return 0; if(t===1) return 1;
    const c4 = (2*Math.PI)/2.5;
    return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
  },
};

function seg(t, start, end) {
  return Math.max(0, Math.min(1, (t - start) / (end - start)));
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function fitText(ctx, text, maxWidth, startSize, fontFamily) {
  let size = startSize;
  ctx.font = `${size}px ${fontFamily || '"JetBrains Mono", monospace'}`;
  while (ctx.measureText(text).width > maxWidth && size > 10) {
    size -= 1;
    ctx.font = `${size}px ${fontFamily || '"JetBrains Mono", monospace'}`;
  }
  return size;
}

function setFont(ctx, size, weight) {
  ctx.font = `${weight||400} ${size}px "JetBrains Mono", monospace`;
}

// Background with subtle grid
function drawBG(ctx) {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  // subtle grid
  ctx.strokeStyle = 'rgba(50,108,229,0.05)';
  ctx.lineWidth = 1;
  for(let x=0; x<W; x+=80) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0; y<H; y+=80) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

// Episode label bottom-left
function drawEpLabel(ctx, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.5;
  setFont(ctx, 22, 400);
  ctx.fillStyle = SUBTLE;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('run the docs · kubernetes · ep07', 48, H - 32);
  ctx.restore();
}

// --- SCENE 1: HOOK (0-9.2s) ---
function drawScene1(ctx, t) {
  const tSec = t * TOTAL_DURATION;
  drawBG(ctx);

  // "API keys." "Database passwords." "TLS certs." appear one by one
  const items = [
    { label: 'API_KEY', color: ACCENT2, t0: 2.0, t1: 2.8 },
    { label: 'DB_PASSWORD', color: ACCENT2, t0: 2.5, t1: 3.3 },
    { label: 'TLS_CERT', color: ACCENT2, t0: 3.0, t1: 3.8 },
  ];

  const badThings = [
    { label: 'Dockerfile', t0: 3.8, t1: 4.5, x: 320 },
    { label: 'git commit', t0: 4.2, t1: 4.9, x: 640 },
  ];

  const secretGlow = seg(tSec, 6.0, 7.5);

  // Header
  const headAlpha = ease.out(seg(tSec, 2.0, 2.5));
  ctx.save();
  ctx.globalAlpha = headAlpha;
  setFont(ctx, 42, 700);
  ctx.fillStyle = SUBTLE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Sensitive data. Keep it out of your image.', CX, 60);
  ctx.restore();

  // Three credential items stacked center-left
  items.forEach((item, i) => {
    const alpha = ease.out(seg(tSec, item.t0, item.t1));
    const y = 240 + i * 160;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Box
    roundRect(ctx, 200, y, 520, 100, 10);
    ctx.fillStyle = CODE_BG;
    ctx.fill();
    roundRect(ctx, 200, y, 4, 100, 2);
    ctx.fillStyle = RED;
    ctx.fill();
    setFont(ctx, 38, 700);
    ctx.fillStyle = item.color;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(item.label, 230, y + 50);
    ctx.restore();
  });

  // Red X marks
  badThings.forEach((bad, i) => {
    const alpha = ease.out(seg(tSec, bad.t0, bad.t1));
    const y = 540;
    ctx.save();
    ctx.globalAlpha = alpha;
    roundRect(ctx, bad.x, y, 300, 80, 8);
    ctx.fillStyle = hexToRgba(RED, 0.12);
    ctx.fill();
    ctx.strokeStyle = RED;
    ctx.lineWidth = 2;
    ctx.stroke();
    // X
    ctx.strokeStyle = RED;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(bad.x + 16, y + 16); ctx.lineTo(bad.x + 50, y + 50);
    ctx.moveTo(bad.x + 50, y + 16); ctx.lineTo(bad.x + 16, y + 50);
    ctx.stroke();
    setFont(ctx, 28, 600);
    ctx.fillStyle = RED;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(bad.label, bad.x + 66, y + 40);
    ctx.restore();
  });

  // Secret box glows as correct solution
  const secretAlpha = ease.spring(seg(tSec, 6.3, 7.2));
  ctx.save();
  ctx.globalAlpha = Math.min(secretAlpha, 1) * 0.9 + 0.05;
  const sx = 820, sy = 350, sw = 500, sh = 160;
  // Glow
  if (secretGlow > 0) {
    ctx.shadowColor = ACCENT;
    ctx.shadowBlur = 40 * secretGlow;
  }
  roundRect(ctx, sx, sy, sw, sh, 14);
  ctx.fillStyle = hexToRgba(ACCENT, 0.15);
  ctx.fill();
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.shadowBlur = 0;
  setFont(ctx, 24, 600);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('kind: Secret', CX, sy + 20);
  setFont(ctx, 48, 700);
  ctx.fillStyle = GREEN;
  ctx.textBaseline = 'middle';
  ctx.fillText('✓ Use a Secret', CX, sy + sh/2 + 18);
  ctx.restore();

  // "Don't put them in your image" text
  const dontAlpha = ease.out(seg(tSec, 6.3, 7.0));
  ctx.save();
  ctx.globalAlpha = dontAlpha;
  setFont(ctx, 36, 400);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText("Don't bake credentials into your image.", CX, 560);
  ctx.restore();

  drawEpLabel(ctx, 1);
}

// --- SCENE 2: WHAT IS A SECRET (9.6-20.5s) ---
function drawScene2(ctx, t) {
  const tSec = t * TOTAL_DURATION;
  drawBG(ctx);

  const titleAlpha = ease.out(seg(tSec, 9.6, 10.2));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 52, 700);
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Kubernetes Secret', CX, 60);
  ctx.restore();

  // Secret box anatomy
  const boxAlpha = ease.out(seg(tSec, 9.6, 10.5));
  const bx = 160, by = 150, bw = 700, bh = 500;
  ctx.save();
  ctx.globalAlpha = boxAlpha;
  roundRect(ctx, bx, by, bw, bh, 16);
  ctx.fillStyle = CODE_BG;
  ctx.fill();
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Title bar
  ctx.fillStyle = hexToRgba(ACCENT, 0.2);
  ctx.fillRect(bx, by, bw, 56);
  setFont(ctx, 26, 700);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('  apiVersion: v1', bx + 16, by + 28);
  setFont(ctx, 26, 700);
  ctx.fillStyle = TEXT;
  ctx.fillText('  kind: Secret', bx + 16, by + 84);
  setFont(ctx, 26, 600);
  ctx.fillStyle = ACCENT2;
  ctx.fillText('  type: Opaque', bx + 16, by + 128);
  ctx.fillStyle = SUBTLE;
  ctx.fillText('  metadata:', bx + 16, by + 172);
  ctx.fillStyle = TEXT;
  ctx.fillText('    name: my-secret', bx + 16, by + 212);
  ctx.fillStyle = SUBTLE;
  ctx.fillText('  data:', bx + 16, by + 256);

  // Keys with blurred values
  const keys = [
    { key: '    username:', val: 'dXNlcm5hbWU=' },
    { key: '    password:', val: 'cGFzc3dvcmQ=' },
  ];
  keys.forEach((item, i) => {
    const ky = by + 300 + i * 60;
    ctx.fillStyle = GREEN;
    ctx.fillText(item.key, bx + 16, ky);
    // Blurred/dim value
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = YELLOW;
    ctx.fillText(' ' + item.val, bx + 16 + ctx.measureText(item.key).width + 8, ky);
    ctx.restore();
  });
  ctx.restore();

  // Type badge
  const typeAlpha = ease.out(seg(tSec, 10.5, 11.2));
  ctx.save();
  ctx.globalAlpha = typeAlpha;
  roundRect(ctx, bx + bw - 180, by + 60, 160, 44, 22);
  ctx.fillStyle = hexToRgba(ACCENT, 0.25);
  ctx.fill();
  ctx.strokeStyle = ACCENT2;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  setFont(ctx, 20, 600);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Opaque', bx + bw - 100, by + 82);
  ctx.restore();

  // Arrow + Pod
  const podAlpha = ease.out(seg(tSec, 11.5, 12.5));
  ctx.save();
  ctx.globalAlpha = podAlpha;
  // Arrow
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(bx + bw + 20, by + bh/2);
  ctx.lineTo(bx + bw + 160, by + bh/2);
  ctx.stroke();
  ctx.setLineDash([]);
  // Arrowhead
  ctx.beginPath();
  ctx.moveTo(bx + bw + 160, by + bh/2);
  ctx.lineTo(bx + bw + 140, by + bh/2 - 12);
  ctx.lineTo(bx + bw + 140, by + bh/2 + 12);
  ctx.closePath();
  ctx.fillStyle = ACCENT;
  ctx.fill();
  // Pod box
  const px = bx + bw + 180, py = by + bh/2 - 90, pw = 300, ph = 180;
  roundRect(ctx, px, py, pw, ph, 12);
  ctx.fillStyle = hexToRgba(GREEN, 0.1);
  ctx.fill();
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = 2;
  ctx.stroke();
  setFont(ctx, 28, 700);
  ctx.fillStyle = GREEN;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Pod', px + pw/2, py + 50);
  setFont(ctx, 22, 400);
  ctx.fillStyle = TEXT;
  ctx.fillText('env vars', px + pw/2, py + 94);
  ctx.fillText('volume files', px + pw/2, py + 130);
  ctx.restore();

  // Label "inject at runtime"
  const labelAlpha = ease.out(seg(tSec, 12.0, 12.8));
  ctx.save();
  ctx.globalAlpha = labelAlpha;
  setFont(ctx, 28, 400);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Injected at runtime — not baked into the image', CX, H - 200);
  ctx.restore();

  // "independent" label
  const indAlpha = ease.out(seg(tSec, 13.85, 14.5));
  ctx.save();
  ctx.globalAlpha = indAlpha;
  setFont(ctx, 26, 400);
  ctx.fillStyle = SUBTLE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Created independently of Pods — less exposure risk', CX, H - 160);
  ctx.restore();

  drawEpLabel(ctx, 1);
}

// --- SCENE 3: THE CATCH (20.5-39.9s) ---
function drawScene3(ctx, t) {
  const tSec = t * TOTAL_DURATION;
  drawBG(ctx);

  // Warning banner
  const bannerAlpha = ease.out(seg(tSec, 20.5, 21.2));
  ctx.save();
  ctx.globalAlpha = bannerAlpha;
  roundRect(ctx, 80, 60, W - 160, 100, 12);
  ctx.fillStyle = hexToRgba(YELLOW, 0.15);
  ctx.fill();
  ctx.strokeStyle = YELLOW;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  setFont(ctx, 40, 700);
  ctx.fillStyle = YELLOW;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚠  NOT encrypted by default', CX, 110);
  ctx.restore();

  // etcd box with open padlock
  const etcdAlpha = ease.out(seg(tSec, 21.5, 22.5));
  ctx.save();
  ctx.globalAlpha = etcdAlpha;
  const ex = 160, ey = 220, ew = 480, eh = 280;
  roundRect(ctx, ex, ey, ew, eh, 14);
  ctx.fillStyle = CODE_BG;
  ctx.fill();
  ctx.strokeStyle = RED;
  ctx.lineWidth = 2;
  ctx.stroke();
  setFont(ctx, 32, 700);
  ctx.fillStyle = RED;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('etcd', ex + ew/2, ey + 20);
  // Open padlock emoji
  setFont(ctx, 80, 400);
  ctx.textBaseline = 'middle';
  ctx.fillText('🔓', ex + ew/2, ey + eh/2 + 20);
  setFont(ctx, 22, 400);
  ctx.fillStyle = SUBTLE;
  ctx.textBaseline = 'bottom';
  ctx.fillText('cluster state store', ex + ew/2, ey + eh - 14);
  ctx.restore();

  // base64 != encryption
  const b64Alpha = ease.out(seg(tSec, 22.5, 23.3));
  ctx.save();
  ctx.globalAlpha = b64Alpha;
  const bx = 700, by2 = 220, bw2 = 560, bh2 = 130;
  roundRect(ctx, bx, by2, bw2, bh2, 12);
  ctx.fillStyle = hexToRgba(RED, 0.1);
  ctx.fill();
  ctx.strokeStyle = RED;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  setFont(ctx, 38, 700);
  ctx.fillStyle = RED;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Strikethrough text rendered manually
  const st = 'base64';
  const stX = bx + bw2/2 - 90;
  const stY = by2 + bh2/2;
  ctx.fillText(st + '  ≠  encryption', bx + bw2/2, stY);
  // Strikethrough line over "base64"
  ctx.strokeStyle = RED;
  ctx.lineWidth = 4;
  setFont(ctx, 38, 700);
  const stW = ctx.measureText(st).width;
  ctx.beginPath();
  ctx.moveTo(stX, stY); ctx.lineTo(stX + stW, stY);
  ctx.stroke();
  ctx.restore();

  // Fix checklist
  const fixes = [
    { label: 'Encryption at Rest', t0: 25.5, t1: 26.5 },
    { label: 'RBAC least privilege', t0: 28.0, t1: 29.0 },
    { label: 'External vault (optional)', t0: 30.5, t1: 31.5 },
  ];
  fixes.forEach((fix, i) => {
    const alpha = ease.spring(seg(tSec, fix.t0, fix.t1));
    const fy = 420 + i * 100;
    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 1);
    roundRect(ctx, 700, fy, 560, 76, 10);
    ctx.fillStyle = hexToRgba(GREEN, 0.1);
    ctx.fill();
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    setFont(ctx, 30, 600);
    ctx.fillStyle = GREEN;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('✅  ' + fix.label, 720, fy + 38);
    ctx.restore();
  });

  drawEpLabel(ctx, 1);
}

// --- SCENE 4: USAGE PATTERNS (39.9-52.5s) ---
function drawScene4(ctx, t) {
  const tSec = t * TOTAL_DURATION;
  drawBG(ctx);

  const titleAlpha = ease.out(seg(tSec, 39.9, 40.5));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 52, 700);
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Three Ways to Use a Secret', CX, 60);
  ctx.restore();

  const cards = [
    {
      emoji: '🌿',
      title: 'Env Var Injection',
      lines: ['env:', '  - name: DB_PASS', '    valueFrom:', '      secretKeyRef:'],
      color: GREEN,
      t0: 42.4, t1: 43.2,
      x: 130
    },
    {
      emoji: '📁',
      title: 'Volume Mount',
      lines: ['volumes:', '  - name: secret-vol', '    secret:', '      secretName: s'],
      color: ACCENT2,
      t0: 45.8, t1: 46.6,
      x: 620
    },
    {
      emoji: '🐳',
      title: 'imagePullSecret',
      lines: ['imagePullSecrets:', '  - name: regcred', '', '(private registry)'],
      color: YELLOW,
      t0: 48.5, t1: 49.3,
      x: 1110
    },
  ];

  const CW = 440, CH = 480;
  cards.forEach(card => {
    const alpha = ease.spring(seg(tSec, card.t0, card.t1));
    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 1);
    const cy2 = 180;
    roundRect(ctx, card.x, cy2, CW, CH, 16);
    ctx.fillStyle = CODE_BG;
    ctx.fill();
    ctx.strokeStyle = card.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Header
    ctx.fillStyle = hexToRgba(card.color, 0.15);
    ctx.fillRect(card.x, cy2, CW, 70);
    setFont(ctx, 36, 400);
    ctx.fillStyle = card.color;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(card.emoji + '  ' + card.title, card.x + 20, cy2 + 35);
    // Code lines
    setFont(ctx, 22, 400);
    ctx.fillStyle = TEXT;
    card.lines.forEach((line, li) => {
      ctx.fillText(line, card.x + 20, cy2 + 100 + li * 50);
    });
    ctx.restore();
  });

  drawEpLabel(ctx, 1);
}

// --- SCENE 5: PAYOFF (52.5-62.5s) ---
function drawScene5(ctx, t) {
  const tSec = t * TOTAL_DURATION;
  drawBG(ctx);

  const titleAlpha = ease.out(seg(tSec, 52.5, 53.2));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 48, 700);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('The Secure Path', CX, 60);
  ctx.restore();

  const rules = [
    { text: 'Use Secrets', color: GREEN, t0: 52.76, t1: 53.6 },
    { text: 'Encrypt etcd', color: GREEN, t0: 53.8, t1: 54.6 },
    { text: 'Restrict RBAC', color: GREEN, t0: 55.0, t1: 55.8 },
    { text: 'External vault (optional)', color: ACCENT2, t0: 56.85, t1: 57.6 },
    { text: "Don't commit credentials to images", color: RED, t0: 59.43, t1: 60.2 },
  ];

  rules.forEach((rule, i) => {
    const alpha = ease.spring(seg(tSec, rule.t0, rule.t1));
    const ry = 180 + i * 110;
    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 1);
    roundRect(ctx, 320, ry, W - 640, 88, 10);
    ctx.fillStyle = hexToRgba(rule.color, 0.08);
    ctx.fill();
    ctx.strokeStyle = rule.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Left accent
    roundRect(ctx, 320, ry, 5, 88, 2);
    ctx.fillStyle = rule.color;
    ctx.fill();
    setFont(ctx, 36, 600);
    ctx.fillStyle = rule.color;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    const icon = rule.color === RED ? '✗  ' : '✓  ';
    ctx.fillText(icon + rule.text, 350, ry + 44);
    ctx.restore();
  });

  drawEpLabel(ctx, 1);
}

// --- SCENE 6: OUTRO (62.5-69.4s) ---
function drawScene6(ctx, t) {
  const tSec = t * TOTAL_DURATION;
  drawBG(ctx);

  const p = ease.out(seg(tSec, 62.5, 64.5));

  // Logo
  const logo = document.getElementById('k8sLogo');
  if (logo && logo.complete && p > 0) {
    ctx.save();
    ctx.globalAlpha = p;
    ctx.drawImage(logo, CX - 80, 200, 160, 160);
    ctx.restore();
  }

  // Main label
  ctx.save();
  ctx.globalAlpha = p;
  setFont(ctx, 72, 700);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('kubernetes · secrets', CX, CY - 20);

  // Subtitle
  setFont(ctx, 32, 400);
  ctx.fillStyle = SUBTLE;
  ctx.fillText('run the docs', CX, CY + 60);
  ctx.restore();

  // URL pills
  const pillAlpha = ease.out(seg(tSec, 63.5, 64.5)) * p;
  const pills = [
    { label: 'kubernetes.io/docs/concepts/configuration/secret/', color: ACCENT },
    { label: 'github.com/run-the-docs/kubernetes', color: ACCENT2 },
  ];
  pills.forEach((pill, i) => {
    const py2 = CY + 140 + i * 80;
    ctx.save();
    ctx.globalAlpha = pillAlpha;
    const pw = 900, ph = 52;
    const px2 = CX - pw/2;
    roundRect(ctx, px2, py2, pw, ph, 26);
    ctx.fillStyle = hexToRgba(pill.color, 0.12);
    ctx.fill();
    ctx.strokeStyle = pill.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    setFont(ctx, 22, 400);
    ctx.fillStyle = pill.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pill.label, CX, py2 + ph/2);
    ctx.restore();
  });

  drawEpLabel(ctx, p);
}

// Segment time lookup
function getSegEnd(idx) {
  if (!TIMING.length) return 0;
  return TIMING[idx] ? TIMING[idx].end : 0;
}

function getSegStart(idx) {
  if (!TIMING.length) return 0;
  return TIMING[idx] ? TIMING[idx].start : 0;
}

// Scene boundaries (seconds)
// 0-9.2s: HOOK
// 9.6-20.5s: WHAT IS A SECRET
// 20.5-39.9s: THE CATCH
// 39.9-52.5s: USAGE PATTERNS
// 52.5-62.5s: PAYOFF
// 62.5+: OUTRO

const SCENE_BOUNDS = [
  { start: 0,    end: 9.5 },
  { start: 9.5,  end: 20.5 },
  { start: 20.5, end: 39.9 },
  { start: 39.9, end: 52.5 },
  { start: 52.5, end: 62.5 },
  { start: 62.5, end: 999  },
];

const SCENE_FNS = [drawScene1, drawScene2, drawScene3, drawScene4, drawScene5, drawScene6];

function crossfade(ctx, fromFn, toFn, t, tSec, duration=0.4) {
  const alpha = Math.min(1, (tSec % duration) / duration);
  fromFn(ctx, t);
  ctx.save();
  ctx.globalAlpha = alpha;
  toFn(ctx, t);
  ctx.restore();
}

window.renderFrame = function(frameNum) {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const tSec = frameNum / 30;
  const t = tSec / TOTAL_DURATION;

  let sceneIdx = 0;
  for (let i = 0; i < SCENE_BOUNDS.length; i++) {
    if (tSec >= SCENE_BOUNDS[i].start && tSec < SCENE_BOUNDS[i].end) {
      sceneIdx = i;
      break;
    }
  }

  SCENE_FNS[sceneIdx](ctx, t);
};

window.setTiming = function(segs, totalDur) {
  TIMING = segs;
  TOTAL_DURATION = totalDur;
};

// Preview render
renderFrame(60);
</script>

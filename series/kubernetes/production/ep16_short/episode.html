<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080810; width: 1080px; height: 1920px; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1080" height="1920"></canvas>
<script>
const W = 1080, H = 1920, CX = 540, FPS = 30;
const ACCENT  = '#326CE5';
const ACCENT2 = '#61a8ff';
const TEXT    = '#f8fafc';
const MUTED   = '#94a3b8';
const CODE_BG = '#0d1117';
const GREEN   = '#4ade80';
const YELLOW  = '#facc15';
const RED     = '#f87171';
const ORANGE  = '#fb923c';
const PURPLE  = '#a78bfa';

let segments = [], totalDuration = 60;
window.setTiming = function(segs, dur) { segments = segs; totalDuration = dur; };

function clamp(v, lo=0, hi=1) { return Math.max(lo, Math.min(hi, v)); }
function easeOut(x) { return 1 - Math.pow(1 - clamp(x), 3); }
function prog(t, t0, t1) { return clamp((t - t0) / (t1 - t0)); }
function segStart(i) { return segments[i] ? segments[i].start : 0; }

function setFont(ctx, size, weight=400) {
  ctx.font = `${weight} ${size}px 'JetBrains Mono', monospace`;
}

function drawTextFit(ctx, text, x, y, maxW, fontSize, color, align='center', weight=700) {
  let size = fontSize;
  ctx.font = `${weight} ${size}px 'JetBrains Mono', monospace`;
  while (ctx.measureText(text).width > maxW && size > 10) {
    size -= 1;
    ctx.font = `${weight} ${size}px 'JetBrains Mono', monospace`;
  }
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function drawBG(ctx) {
  ctx.clearRect(0, 0, W, H);
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0d1a');
  grad.addColorStop(1, '#080810');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawCaption(ctx, t) {
  const seg = segments.find(s => t >= s.start && t < s.end);
  if (!seg) return;
  const text = seg.text;
  let fontSize = 30;
  ctx.font = `400 ${fontSize}px 'JetBrains Mono', monospace`;
  const maxTextW = W - 160;
  while (ctx.measureText(text).width > maxTextW && fontSize > 16) {
    fontSize--;
    ctx.font = `400 ${fontSize}px 'JetBrains Mono', monospace`;
  }
  let displayText = text;
  if (ctx.measureText(displayText).width > maxTextW) displayText = text.slice(0, 58) + '…';
  const tw = ctx.measureText(displayText).width;
  const pillW = tw + 64, pillH = 64;
  const px = CX - pillW / 2, py = H - 180;
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(px, py, pillW, pillH, 32);
  ctx.fillStyle = 'rgba(50,108,229,0.18)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(50,108,229,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(displayText, CX, py + pillH / 2);
  ctx.restore();
}

function drawFooter(ctx, label) {
  let fontSize = 26;
  ctx.font = `600 ${fontSize}px 'JetBrains Mono', monospace`;
  const tw = ctx.measureText(label).width;
  const pillW = Math.min(tw + 48, W - 80), pillH = 52;
  const px = CX - pillW / 2, py = H - 90;
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(px, py, pillW, pillH, 26);
  ctx.fillStyle = 'rgba(50,108,229,0.12)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(50,108,229,0.35)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, CX, py + pillH / 2);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

// ── Scene 1: What is a Node + 3 components ────────────────────────────────
// Segs 0-4: intro + kubelet + runtime + kube-proxy
function drawScene1(ctx, t) {
  drawBG(ctx);

  ctx.fillStyle = ACCENT;
  ctx.fillRect(80, 60, 920, 6);

  // Title
  const ta = easeOut(prog(t, 0.3, 1.2));
  ctx.save(); ctx.globalAlpha = ta;
  setFont(ctx, 90, 700);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Nodes', CX, 210);
  setFont(ctx, 32, 400);
  ctx.fillStyle = MUTED;
  ctx.fillText('kubernetes · ep 16', CX, 290);
  ctx.restore();

  // "Machines that run your workloads"
  const defA = easeOut(prog(t, segStart(0), segStart(0) + 1.0));
  ctx.save(); ctx.globalAlpha = defA;
  roundRect(ctx, 80, 360, 920, 120, 16);
  ctx.fillStyle = 'rgba(50,108,229,0.1)';
  ctx.fill();
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 2;
  ctx.stroke();
  setFont(ctx, 32, 600);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('The machine that runs your Pods', CX, 420);
  ctx.restore();

  // 3 component cards
  const components = [
    { label: 'kubelet',            desc: 'Node agent — runs Pods',         color: GREEN,  seg: 1 },
    { label: 'container runtime',  desc: 'Docker / containerd / CRI-O',    color: YELLOW, seg: 1 },
    { label: 'kube-proxy',         desc: 'Network rules & routing',        color: PURPLE, seg: 1 },
  ];

  components.forEach((comp, i) => {
    const a = easeOut(prog(t, segStart(comp.seg) + i * 0.3, segStart(comp.seg) + i * 0.3 + 0.9));
    ctx.save(); ctx.globalAlpha = a;
    const cy = 570 + i * 220;
    roundRect(ctx, 80, cy, 920, 170, 20);
    ctx.fillStyle = CODE_BG;
    ctx.fill();
    ctx.strokeStyle = comp.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Left color bar
    ctx.fillStyle = comp.color;
    ctx.fillRect(80, cy, 8, 170);

    drawTextFit(ctx, comp.label, CX, cy + 65, 800, 40, comp.color, 'center', 700);

    setFont(ctx, 26, 400);
    ctx.fillStyle = MUTED;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(comp.desc, CX, cy + 115);
    ctx.restore();
  });

  drawCaption(ctx, t);
  drawFooter(ctx, 'kubernetes · nodes');
}

// ── Scene 2: Node Conditions ──────────────────────────────────────────────
// Segs 5-9: "control plane tracks health..." through conditions
function drawScene2(ctx, t) {
  drawBG(ctx);

  const ha = easeOut(prog(t, segStart(5), segStart(5) + 0.8));
  ctx.save(); ctx.globalAlpha = ha;
  setFont(ctx, 56, 700);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Node Conditions', CX, 160);
  ctx.restore();

  const conditions = [
    { name: 'Ready',              desc: 'Healthy, can schedule Pods',     color: GREEN,  seg: 6 },
    { name: 'MemoryPressure',     desc: 'Low memory warning',             color: YELLOW, seg: 7 },
    { name: 'DiskPressure',       desc: 'Low disk space warning',         color: YELLOW, seg: 7 },
    { name: 'PIDPressure',        desc: 'Too many processes',             color: ORANGE, seg: 7 },
    { name: 'NetworkUnavailable', desc: "Network not configured",         color: RED,    seg: 8 },
  ];

  conditions.forEach((cond, i) => {
    const a = easeOut(prog(t, segStart(cond.seg) + (i > 0 ? (i - 1) * 0.25 : 0), segStart(cond.seg) + (i > 0 ? (i - 1) * 0.25 : 0) + 0.7));
    ctx.save(); ctx.globalAlpha = a;
    const cy = 260 + i * 210;

    roundRect(ctx, 80, cy, 920, 160, 16);
    ctx.fillStyle = CODE_BG;
    ctx.fill();
    ctx.strokeStyle = cond.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Status dot
    ctx.beginPath();
    ctx.arc(130, cy + 80, 18, 0, Math.PI * 2);
    ctx.fillStyle = cond.color;
    ctx.fill();

    drawTextFit(ctx, cond.name, 580, cy + 52, 680, 34, cond.color, 'center', 700);
    setFont(ctx, 24, 400);
    ctx.fillStyle = MUTED;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(cond.desc, 580, cy + 100);
    ctx.restore();
  });

  drawCaption(ctx, t);
  drawFooter(ctx, 'kubernetes · nodes');
}

// ── Scene 3: Eviction + Outro ─────────────────────────────────────────────
// Segs 9-11: eviction → rate limits → "foundation"
function drawScene3(ctx, t) {
  drawBG(ctx);

  const ha = easeOut(prog(t, segStart(9), segStart(9) + 0.8));
  ctx.save(); ctx.globalAlpha = ha;
  setFont(ctx, 56, 700);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Node Failure', CX, 160);
  ctx.restore();

  // Eviction flow
  const flowItems = [
    { text: 'Node goes unhealthy',   color: RED,    seg: 9  },
    { text: 'Node controller detects', color: ORANGE, seg: 9 },
    { text: 'Pods evicted (rate-limited)', color: YELLOW, seg: 10 },
    { text: 'Rescheduled on healthy nodes', color: GREEN, seg: 10 },
  ];

  flowItems.forEach((item, i) => {
    const a = easeOut(prog(t, segStart(item.seg) + i * 0.2, segStart(item.seg) + i * 0.2 + 0.7));
    ctx.save(); ctx.globalAlpha = a;
    const cy = 270 + i * 185;

    roundRect(ctx, 120, cy, 840, 130, 16);
    ctx.fillStyle = CODE_BG;
    ctx.fill();
    ctx.strokeStyle = item.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    drawTextFit(ctx, item.text, CX, cy + 65, 760, 34, item.color, 'center', 700);

    if (i < flowItems.length - 1) {
      ctx.strokeStyle = item.color;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]);
      ctx.beginPath();
      ctx.moveTo(CX, cy + 130);
      ctx.lineTo(CX, cy + 143);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = item.color;
      ctx.beginPath();
      ctx.moveTo(CX - 10, cy + 138); ctx.lineTo(CX + 10, cy + 138); ctx.lineTo(CX, cy + 155);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  });

  // Tagline
  const outA = easeOut(prog(t, segStart(11), segStart(11) + 1.0));
  ctx.save(); ctx.globalAlpha = outA;
  roundRect(ctx, 80, 1030, 920, 160, 20);
  ctx.fillStyle = 'rgba(50,108,229,0.12)';
  ctx.fill();
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  setFont(ctx, 36, 700);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Nodes are the foundation.', CX, 1085);
  ctx.fillStyle = ACCENT;
  setFont(ctx, 30, 400);
  ctx.fillText('Everything else runs on top of them.', CX, 1140);
  ctx.restore();

  drawCaption(ctx, t);
  drawFooter(ctx, 'kubernetes · nodes');
}

// ── Dispatcher ────────────────────────────────────────────────────────────
window.renderFrame = function(frameNum) {
  const ctx = document.getElementById('c').getContext('2d');
  const t = frameNum / FPS;
  const s5  = segStart(5);
  const s9  = segStart(9);

  if (t < s5) {
    drawScene1(ctx, t);
  } else if (t < s9) {
    drawScene2(ctx, t);
  } else {
    drawScene3(ctx, t);
  }
};
</script>
</body>
</html>

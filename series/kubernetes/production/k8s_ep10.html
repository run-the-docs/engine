<script>
const W = 1920, H = 1080, CX = 960, CY = 540;
const BG     = '#080810';
const ACCENT  = '#326CE5';
const ACCENT2 = '#60a5fa';
const TEXT    = '#f8fafc';
const CODE_BG = '#0d1117';
const GREEN   = '#22c55e';
const YELLOW  = '#eab308';
const RED     = '#ef4444';
const SUBTLE  = '#334155';
const PURPLE  = '#a78bfa';

let TOTAL_DURATION = 65.05;

const ease = {
  out:    t => 1 - Math.pow(1-t, 3),
  inOut:  t => t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,
  spring: t => {
    if(t===0) return 0; if(t===1) return 1;
    const c4 = (2*Math.PI)/2.5;
    return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
  },
};

function seg(t, start, end) {
  return Math.max(0, Math.min(1, (t - start) / (end - start)));
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function fitText(ctx, text, maxWidth, startSize, fontFamily) {
  let size = startSize;
  ctx.font = `${size}px ${fontFamily || '"JetBrains Mono", monospace'}`;
  while (ctx.measureText(text).width > maxWidth && size > 10) {
    size -= 1;
    ctx.font = `${size}px ${fontFamily || '"JetBrains Mono", monospace'}`;
  }
  return size;
}

function setFont(ctx, size, weight) {
  ctx.font = `${weight||400} ${size}px "JetBrains Mono", monospace`;
}

function drawBG(ctx) {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(50,108,229,0.05)';
  ctx.lineWidth = 1;
  for(let x=0; x<W; x+=80) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0; y<H; y+=80) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawEpLabel(ctx, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.5;
  setFont(ctx, 22, 400);
  ctx.fillStyle = SUBTLE;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('run the docs · kubernetes · ep10', 48, H - 32);
  ctx.restore();
}

// --- SCENE 1: HOOK (0–9.2s) ---
// Timing: seg 0 starts at 2.0s, ends 8.87s
function drawScene1(ctx, tSec) {
  drawBG(ctx);

  // Title text flies in
  const titleAlpha = ease.out(seg(tSec, 2.0, 2.6));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 56, 700);
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('StatefulSets', CX, 60);
  ctx.restore();

  // Database icons with sticky labels — appear one by one
  const dbs = [
    { icon: '🐬', name: 'MySQL',   label: 'mydb-0',   color: ACCENT2, x: 260, t0: 2.2, t1: 2.8 },
    { icon: '📨', name: 'Kafka',   label: 'kafka-0',  color: YELLOW,  x: 760, t0: 3.0, t1: 3.6 },
    { icon: '🔴', name: 'Redis',   label: 'redis-0',  color: RED,     x: 1260, t0: 3.8, t1: 4.4 },
  ];

  dbs.forEach(db => {
    const p = ease.spring(seg(tSec, db.t0, db.t1));
    const alpha = Math.min(1, p);
    const cy = 380;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Card
    roundRect(ctx, db.x, cy - 140, 420, 340, 16);
    ctx.fillStyle = CODE_BG;
    ctx.fill();
    ctx.strokeStyle = db.color;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Icon
    setFont(ctx, 80, 400);
    ctx.fillStyle = db.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(db.icon, db.x + 210, cy - 40);
    // DB name
    setFont(ctx, 32, 700);
    ctx.fillStyle = TEXT;
    ctx.fillText(db.name, db.x + 210, cy + 40);
    // Sticky label badge
    const labelW = 240, labelH = 52;
    const lx = db.x + 210 - labelW/2, ly = cy + 110;
    roundRect(ctx, lx, ly, labelW, labelH, 26);
    ctx.fillStyle = hexToRgba(db.color, 0.2);
    ctx.fill();
    ctx.strokeStyle = db.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    setFont(ctx, 26, 700);
    ctx.fillStyle = db.color;
    ctx.fillText(db.label, db.x + 210, ly + labelH/2);
    ctx.restore();
  });

  // "They need to be the SAME Pod" — appears at ~5s
  const taglineAlpha = ease.out(seg(tSec, 5.5, 6.3));
  ctx.save();
  ctx.globalAlpha = taglineAlpha;
  setFont(ctx, 46, 700);
  ctx.fillStyle = GREEN;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('They need to be the same Pod.', CX, 820);
  ctx.restore();

  drawEpLabel(ctx, 1);
}

// --- SCENE 2: DEPLOYMENT vs STATEFULSET (9.2–25s) ---
// Segs 1-3: 9.25-24.84s
function drawScene2(ctx, tSec) {
  drawBG(ctx);

  const titleAlpha = ease.out(seg(tSec, 9.2, 9.8));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 44, 700);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Deployment  vs  StatefulSet', CX, 40);
  ctx.restore();

  // DEPLOYMENT side (left)
  const depAlpha = ease.out(seg(tSec, 9.3, 10.0));
  ctx.save();
  ctx.globalAlpha = depAlpha;
  // Panel
  roundRect(ctx, 80, 120, 820, 720, 16);
  ctx.fillStyle = CODE_BG;
  ctx.fill();
  ctx.strokeStyle = SUBTLE;
  ctx.lineWidth = 2;
  ctx.stroke();
  // Header
  setFont(ctx, 36, 700);
  ctx.fillStyle = YELLOW;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Deployment', 490, 170);
  setFont(ctx, 22, 400);
  ctx.fillStyle = SUBTLE;
  ctx.fillText('Pods are interchangeable', 490, 215);
  ctx.restore();

  // Random pod names appear
  const randPods = [
    { name: 'web-7b9d4f-xkpq2', t0: 10.0, x: 180, y: 310 },
    { name: 'web-7b9d4f-mnr8t', t0: 10.4, x: 180, y: 410 },
    { name: 'web-7b9d4f-zl9vw', t0: 10.8, x: 180, y: 510 },
  ];
  randPods.forEach(p => {
    const alpha = ease.out(seg(tSec, p.t0, p.t0 + 0.5));
    ctx.save();
    ctx.globalAlpha = alpha;
    roundRect(ctx, p.x, p.y - 30, 620, 60, 8);
    ctx.fillStyle = hexToRgba(YELLOW, 0.08);
    ctx.fill();
    ctx.strokeStyle = hexToRgba(YELLOW, 0.4);
    ctx.lineWidth = 1;
    ctx.stroke();
    setFont(ctx, 24, 400);
    ctx.fillStyle = YELLOW;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔶 ' + p.name, p.x + 16, p.y);
    ctx.restore();
  });

  // "Any Pod can replace any other Pod"
  const depNoteAlpha = ease.out(seg(tSec, 11.5, 12.2));
  ctx.save();
  ctx.globalAlpha = depNoteAlpha;
  setFont(ctx, 22, 400);
  ctx.fillStyle = hexToRgba(YELLOW, 0.7);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Any Pod can replace any other Pod', 490, 640);
  ctx.restore();

  // STATEFULSET side (right)
  const ssAlpha = ease.out(seg(tSec, 13.5, 14.2));
  ctx.save();
  ctx.globalAlpha = ssAlpha;
  roundRect(ctx, 1020, 120, 820, 720, 16);
  ctx.fillStyle = CODE_BG;
  ctx.fill();
  ctx.strokeStyle = ACCENT;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  setFont(ctx, 36, 700);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('StatefulSet', 1430, 170);
  setFont(ctx, 22, 400);
  ctx.fillStyle = SUBTLE;
  ctx.fillText('Pods have sticky identity', 1430, 215);
  ctx.restore();

  // Ordered sticky pods with PVCs
  const ordPods = [
    { name: 'mydb-0', t0: 14.5, y: 320, color: GREEN },
    { name: 'mydb-1', t0: 15.5, y: 470, color: GREEN },
    { name: 'mydb-2', t0: 16.5, y: 620, color: GREEN },
  ];
  ordPods.forEach((p, i) => {
    const alpha = ease.spring(seg(tSec, p.t0, p.t0 + 0.6));
    ctx.save();
    ctx.globalAlpha = Math.min(1, alpha);
    // Pod box
    roundRect(ctx, 1070, p.y - 36, 300, 72, 10);
    ctx.fillStyle = hexToRgba(p.color, 0.12);
    ctx.fill();
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    setFont(ctx, 28, 700);
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.name, 1220, p.y);
    // PVC box below
    roundRect(ctx, 1390, p.y - 26, 220, 52, 8);
    ctx.fillStyle = hexToRgba(PURPLE, 0.12);
    ctx.fill();
    ctx.strokeStyle = PURPLE;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    setFont(ctx, 20, 600);
    ctx.fillStyle = PURPLE;
    ctx.fillText('PVC-' + i, 1500, p.y);
    // Connector line
    ctx.strokeStyle = hexToRgba(PURPLE, 0.5);
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(1370, p.y);
    ctx.lineTo(1390, p.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });

  // "mydb-0 is always mydb-0"
  const stickyAlpha = ease.out(seg(tSec, 19.8, 20.5));
  ctx.save();
  ctx.globalAlpha = stickyAlpha;
  setFont(ctx, 22, 400);
  ctx.fillStyle = hexToRgba(GREEN, 0.8);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('mydb-0 is always mydb-0', 1430, 750);
  ctx.restore();

  drawEpLabel(ctx, 1);
}

// --- SCENE 3: ORDERED OPERATIONS (25–37.7s) ---
// Segs 4-6: 25.2-37.4s
function drawScene3(ctx, tSec) {
  drawBG(ctx);

  const titleAlpha = ease.out(seg(tSec, 25.0, 25.6));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 52, 700);
  ctx.fillStyle = ACCENT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Ordered Operations', CX, 50);
  ctx.restore();

  // Pods creation animation: 0 → 1 → 2
  const podY = 320;
  const pod0alpha = ease.spring(seg(tSec, 25.3, 26.0));
  const pod1alpha = ease.spring(seg(tSec, 26.4, 27.1));
  const pod2alpha = ease.spring(seg(tSec, 27.5, 28.2));

  const pods = [
    { name: 'mydb-0', x: 380, alpha: pod0alpha, color: GREEN },
    { name: 'mydb-1', x: 760, alpha: pod1alpha, color: GREEN },
    { name: 'mydb-2', x: 1140, alpha: pod2alpha, color: GREEN },
  ];

  // Creation arrows
  if (seg(tSec, 26.4, 27.1) > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, ease.out(seg(tSec, 26.4, 27.1)));
    ctx.strokeStyle = ACCENT2;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(620, podY);
    ctx.lineTo(700, podY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(700, podY); ctx.lineTo(685, podY-10); ctx.lineTo(685, podY+10); ctx.closePath();
    ctx.fillStyle = ACCENT2;
    ctx.fill();
    ctx.restore();
  }
  if (seg(tSec, 27.5, 28.2) > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, ease.out(seg(tSec, 27.5, 28.2)));
    ctx.strokeStyle = ACCENT2;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(1000, podY);
    ctx.lineTo(1080, podY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(1080, podY); ctx.lineTo(1065, podY-10); ctx.lineTo(1065, podY+10); ctx.closePath();
    ctx.fillStyle = ACCENT2;
    ctx.fill();
    ctx.restore();
  }

  pods.forEach(pod => {
    ctx.save();
    ctx.globalAlpha = Math.min(1, pod.alpha);
    roundRect(ctx, pod.x - 140, podY - 50, 280, 100, 12);
    ctx.fillStyle = hexToRgba(pod.color, 0.15);
    ctx.fill();
    ctx.strokeStyle = pod.color;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    setFont(ctx, 36, 700);
    ctx.fillStyle = pod.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pod.name, pod.x, podY);
    ctx.restore();
  });

  // Create label
  const createAlpha = ease.out(seg(tSec, 25.3, 26.0));
  ctx.save();
  ctx.globalAlpha = createAlpha;
  setFont(ctx, 28, 600);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Created in order: 0 → 1 → 2', CX, 200);
  ctx.restore();

  // Scale down reverse
  const sdAlpha = ease.out(seg(tSec, 29.5, 30.2));
  ctx.save();
  ctx.globalAlpha = sdAlpha;
  roundRect(ctx, 280, 490, 1360, 80, 10);
  ctx.fillStyle = hexToRgba(RED, 0.08);
  ctx.fill();
  ctx.strokeStyle = hexToRgba(RED, 0.4);
  ctx.lineWidth = 1.5;
  ctx.stroke();
  setFont(ctx, 30, 600);
  ctx.fillStyle = RED;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Scale down in reverse: 2 → 1 → 0', CX, 530);
  ctx.restore();

  // Rolling updates
  const rollAlpha = ease.out(seg(tSec, 30.0, 30.7));
  ctx.save();
  ctx.globalAlpha = rollAlpha;
  roundRect(ctx, 280, 600, 1360, 80, 10);
  ctx.fillStyle = hexToRgba(YELLOW, 0.08);
  ctx.fill();
  ctx.strokeStyle = hexToRgba(YELLOW, 0.4);
  ctx.lineWidth = 1.5;
  ctx.stroke();
  setFont(ctx, 30, 600);
  ctx.fillStyle = YELLOW;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Rolling updates: one Pod at a time', CX, 640);
  ctx.restore();

  // Split-brain prevention
  const sbAlpha = ease.out(seg(tSec, 34.1, 34.8));
  ctx.save();
  ctx.globalAlpha = sbAlpha;
  roundRect(ctx, 280, 710, 1360, 80, 10);
  ctx.fillStyle = hexToRgba(GREEN, 0.08);
  ctx.fill();
  ctx.strokeStyle = hexToRgba(GREEN, 0.4);
  ctx.lineWidth = 1.5;
  ctx.stroke();
  setFont(ctx, 30, 600);
  ctx.fillStyle = GREEN;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✓ Prevents split-brain in clustered databases', CX, 750);
  ctx.restore();

  drawEpLabel(ctx, 1);
}

// --- SCENE 4: PERSISTENT STORAGE (37.7–47.3s) ---
// Segs 7-8: 37.75-46.87s
function drawScene4(ctx, tSec) {
  drawBG(ctx);

  const titleAlpha = ease.out(seg(tSec, 37.6, 38.2));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 52, 700);
  ctx.fillStyle = PURPLE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Persistent Storage', CX, 50);
  ctx.restore();

  // Three Pods each with their own PVC
  const pods = [
    { name: 'mydb-0', pvc: 'data-mydb-0', x: 260, t0: 38.0 },
    { name: 'mydb-1', pvc: 'data-mydb-1', x: 760, t0: 38.5 },
    { name: 'mydb-2', pvc: 'data-mydb-2', x: 1260, t0: 39.0 },
  ];

  pods.forEach(pod => {
    const p = ease.spring(seg(tSec, pod.t0, pod.t0 + 0.7));
    ctx.save();
    ctx.globalAlpha = Math.min(1, p);
    // Pod box
    roundRect(ctx, pod.x - 170, 250, 340, 100, 12);
    ctx.fillStyle = hexToRgba(GREEN, 0.15);
    ctx.fill();
    ctx.strokeStyle = GREEN;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    setFont(ctx, 32, 700);
    ctx.fillStyle = GREEN;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pod.name, pod.x, 300);

    // Connector line
    ctx.strokeStyle = hexToRgba(PURPLE, 0.6);
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(pod.x, 350);
    ctx.lineTo(pod.x, 430);
    ctx.stroke();
    ctx.setLineDash([]);

    // PVC box
    roundRect(ctx, pod.x - 170, 430, 340, 80, 10);
    ctx.fillStyle = hexToRgba(PURPLE, 0.15);
    ctx.fill();
    ctx.strokeStyle = PURPLE;
    ctx.lineWidth = 2;
    ctx.stroke();
    setFont(ctx, 22, 600);
    ctx.fillStyle = PURPLE;
    const pvcSize = fitText(ctx, pod.pvc, 300, 22, '"JetBrains Mono", monospace');
    ctx.font = `600 ${pvcSize}px "JetBrains Mono", monospace`;
    ctx.fillText(pod.pvc, pod.x, 470);
    ctx.restore();
  });

  // "Each Pod: own PVC" label
  const pvcLabelAlpha = ease.out(seg(tSec, 38.0, 38.8));
  ctx.save();
  ctx.globalAlpha = pvcLabelAlpha;
  setFont(ctx, 32, 600);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Each Pod gets its own PersistentVolumeClaim', CX, 160);
  ctx.restore();

  // "Delete StatefulSet → volumes survive" panel
  const surviveAlpha = ease.out(seg(tSec, 41.8, 42.5));
  ctx.save();
  ctx.globalAlpha = surviveAlpha;
  roundRect(ctx, 240, 580, 1440, 200, 16);
  ctx.fillStyle = hexToRgba(GREEN, 0.08);
  ctx.fill();
  ctx.strokeStyle = GREEN;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  setFont(ctx, 36, 700);
  ctx.fillStyle = GREEN;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🗑  Delete StatefulSet', CX, 640);
  ctx.fillText('✓  Volumes survive — data is safe', CX, 720);
  ctx.restore();

  drawEpLabel(ctx, 1);
}

// --- SCENE 5: PAYOFF (47.3–61s) ---
// Segs 9-12: 47.25-61.05s
function drawScene5(ctx, tSec) {
  drawBG(ctx);

  const titleAlpha = ease.out(seg(tSec, 47.2, 47.8));
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  setFont(ctx, 48, 700);
  ctx.fillStyle = ACCENT2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('When to Use What', CX, 50);
  ctx.restore();

  // Decision cards
  const cards = [
    {
      q: 'Stateless workload?',
      a: '→  Deployment',
      color: YELLOW,
      t0: 47.3, t1: 48.0,
      y: 200
    },
    {
      q: 'Needs stable identity + persistent storage?',
      a: '→  StatefulSet',
      color: GREEN,
      t0: 50.5, t1: 51.2,
      y: 400
    },
    {
      q: 'Databases live here.',
      a: '',
      color: ACCENT2,
      t0: 55.3, t1: 56.0,
      y: 600
    },
  ];

  cards.forEach(card => {
    const p = ease.spring(seg(tSec, card.t0, card.t1));
    ctx.save();
    ctx.globalAlpha = Math.min(1, p);
    roundRect(ctx, 240, card.y, 1440, card.a ? 140 : 100, 14);
    ctx.fillStyle = hexToRgba(card.color, 0.1);
    ctx.fill();
    ctx.strokeStyle = card.color;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Left accent bar
    roundRect(ctx, 240, card.y, 6, card.a ? 140 : 100, 3);
    ctx.fillStyle = card.color;
    ctx.fill();

    if (card.a) {
      setFont(ctx, 32, 400);
      ctx.fillStyle = TEXT;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      const qSize = fitText(ctx, card.q, 1380, 32, '"JetBrains Mono", monospace');
      ctx.font = `400 ${qSize}px "JetBrains Mono", monospace`;
      ctx.fillText(card.q, 270, card.y + 50);
      setFont(ctx, 36, 700);
      ctx.fillStyle = card.color;
      const aSize = fitText(ctx, card.a, 1380, 36, '"JetBrains Mono", monospace');
      ctx.font = `700 ${aSize}px "JetBrains Mono", monospace`;
      ctx.fillText(card.a, 270, card.y + 105);
    } else {
      setFont(ctx, 40, 700);
      ctx.fillStyle = card.color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(card.q, CX, card.y + 50);
    }
    ctx.restore();
  });

  // Use case icons
  const usecases = [
    { label: 'MySQL',     t0: 55.5, x: 320 },
    { label: 'Postgres',  t0: 55.7, x: 560 },
    { label: 'MongoDB',   t0: 55.9, x: 800 },
    { label: 'Kafka',     t0: 56.1, x: 1040 },
    { label: 'Redis Cluster', t0: 56.3, x: 1280 },
    { label: 'ZooKeeper', t0: 56.5, x: 1520 },
  ];
  usecases.forEach(u => {
    const alpha = ease.out(seg(tSec, u.t0, u.t0 + 0.4));
    ctx.save();
    ctx.globalAlpha = alpha * 0.7;
    setFont(ctx, 20, 600);
    ctx.fillStyle = ACCENT2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const uSize = fitText(ctx, u.label, 200, 20, '"JetBrains Mono", monospace');
    ctx.font = `600 ${uSize}px "JetBrains Mono", monospace`;
    ctx.fillText(u.label, u.x, 780);
    ctx.restore();
  });

  drawEpLabel(ctx, 1);
}

// --- SCENE 6: OUTRO (61–65s) ---
// Seg 12: 57.72-61.05s, total_duration=65.05
function drawScene6(ctx, tSec) {
  drawBG(ctx);

  const p = ease.out(seg(tSec, 61.0, 63.0));

  // Logo
  const logo = document.getElementById('k8sLogo');
  if (logo && logo.complete && p > 0) {
    ctx.save();
    ctx.globalAlpha = p;
    ctx.drawImage(logo, CX - 80, 160, 160, 160);
    ctx.restore();
  }

  ctx.save();
  ctx.globalAlpha = p;
  setFont(ctx, 76, 700);
  ctx.fillStyle = TEXT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('kubernetes · statefulsets', CX, CY - 10);

  setFont(ctx, 32, 400);
  ctx.fillStyle = SUBTLE;
  ctx.fillText('run the docs', CX, CY + 70);
  ctx.restore();

  // URL pills
  const pillAlpha = ease.out(seg(tSec, 62.0, 63.2)) * p;
  const pills = [
    { label: 'kubernetes.io/docs/concepts/workloads/controllers/statefulset/', color: ACCENT },
    { label: 'github.com/run-the-docs/kubernetes', color: ACCENT2 },
  ];
  pills.forEach((pill, i) => {
    const py = CY + 150 + i * 80;
    ctx.save();
    ctx.globalAlpha = pillAlpha;
    const pw = 1100, ph = 52;
    const px = CX - pw/2;
    roundRect(ctx, px, py, pw, ph, 26);
    ctx.fillStyle = hexToRgba(pill.color, 0.12);
    ctx.fill();
    ctx.strokeStyle = pill.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    setFont(ctx, 22, 400);
    ctx.fillStyle = pill.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const pSize = fitText(ctx, pill.label, pw - 40, 22, '"JetBrains Mono", monospace');
    ctx.font = `400 ${pSize}px "JetBrains Mono", monospace`;
    ctx.fillText(pill.label, CX, py + ph/2);
    ctx.restore();
  });

  drawEpLabel(ctx, p);
}

// Scene boundaries (seconds)
const SCENE_BOUNDS = [
  { start: 0,    end: 9.2 },
  { start: 9.2,  end: 25.2 },
  { start: 25.2, end: 37.7 },
  { start: 37.7, end: 47.3 },
  { start: 47.3, end: 61.0 },
  { start: 61.0, end: 999  },
];

const SCENE_FNS = [drawScene1, drawScene2, drawScene3, drawScene4, drawScene5, drawScene6];

window.renderFrame = function(frameNum) {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const tSec = frameNum / 30;

  let sceneIdx = 0;
  for (let i = 0; i < SCENE_BOUNDS.length; i++) {
    if (tSec >= SCENE_BOUNDS[i].start && tSec < SCENE_BOUNDS[i].end) {
      sceneIdx = i;
      break;
    }
  }

  SCENE_FNS[sceneIdx](ctx, tSec);
};

// Preview render
renderFrame(60);
</script>

<script>
const W = 1920, H = 1080, CX = 960, CY = 540;

const BG      = '#080810';
const ACCENT  = '#326CE5';
const ACCENT2 = '#60a5fa';
const TEXT    = '#f8fafc';
const CODE_BG = '#0d1117';
const GREEN   = '#22c55e';
const YELLOW  = '#eab308';
const SUBTLE  = '#334155';

let TIMING = [];
let TOTAL_DURATION = 89.3;

const ease = {
  out:    t => 1 - Math.pow(1-t, 3),
  inOut:  t => t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,
  spring: t => {
    if(t===0) return 0; if(t===1) return 1;
    const c4 = (2*Math.PI)/2.5;
    return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
  },
};

function seg(t, start, end) {
  return Math.max(0, Math.min(1, (t - start) / (end - start)));
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// Font helpers
function setFont(ctx, size, weight='400') {
  ctx.font = `${weight} ${size}px "JetBrains Mono", monospace`;
}

// Draw a component card
function drawCard(ctx, x, y, w, h, emoji, name, desc, alpha, slideY=0) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(0, slideY);
  // Card bg
  roundRect(ctx, x, y, w, h, 12);
  ctx.fillStyle = hexToRgba(CODE_BG, 0.95);
  ctx.fill();
  // Left accent bar
  roundRect(ctx, x, y, 4, h, 2);
  ctx.fillStyle = ACCENT;
  ctx.fill();
  // Emoji
  setFont(ctx, 36, '400');
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x + 24, y + h/2);
  // Name
  setFont(ctx, 28, '700');
  ctx.fillStyle = ACCENT2;
  ctx.fillText(name, x + 80, y + h/2 - 14);
  // Desc
  setFont(ctx, 22, '400');
  ctx.fillStyle = TEXT;
  ctx.fillText(desc, x + 80, y + h/2 + 16);
  ctx.restore();
}

// Draw arch diagram
function drawArchDiagram(ctx, t, cpAlpha, nodeAlpha, arrowAlpha) {
  const cx = CX, cy = CY;
  const cpW = 820, cpH = 180;
  const cpX = cx - cpW/2, cpY = cy - 220;

  ctx.save();

  // Control plane box
  if(cpAlpha > 0) {
    ctx.globalAlpha = cpAlpha;
    roundRect(ctx, cpX, cpY, cpW, cpH, 16);
    ctx.fillStyle = hexToRgba(ACCENT, 0.12);
    ctx.fill();
    ctx.strokeStyle = ACCENT;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Label
    setFont(ctx, 22, '700');
    ctx.fillStyle = ACCENT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('CONTROL PLANE', cx, cpY + 12);
    // Components inside
    const comps = ['API Server', 'etcd', 'Scheduler', 'Controller Manager'];
    const compW = 160, compH = 52;
    const totalW = comps.length * compW + (comps.length-1)*16;
    const startX = cx - totalW/2;
    comps.forEach((c, i) => {
      const bx = startX + i * (compW+16);
      const by = cpY + cpH/2 - compH/2 + 10;
      roundRect(ctx, bx, by, compW, compH, 8);
      ctx.fillStyle = hexToRgba(ACCENT, 0.25);
      ctx.fill();
      ctx.strokeStyle = hexToRgba(ACCENT, 0.6);
      ctx.lineWidth = 1;
      ctx.stroke();
      setFont(ctx, 17, '600');
      ctx.fillStyle = TEXT;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(c, bx + compW/2, by + compH/2);
    });
  }

  // Node boxes
  if(nodeAlpha > 0) {
    const nodeW = 220, nodeH = 180;
    const nodeY = cy + 20;
    const nodes = [0,1,2];
    nodes.forEach((i) => {
      const nodeX = cx - 360 + i*360 - nodeW/2;
      const ni = ease.spring(Math.min(1, nodeAlpha * 1.5 - i*0.2));
      if(ni <= 0) return;
      ctx.globalAlpha = Math.min(cpAlpha, ni);
      roundRect(ctx, nodeX, nodeY, nodeW, nodeH, 12);
      ctx.fillStyle = hexToRgba(GREEN, 0.08);
      ctx.fill();
      ctx.strokeStyle = hexToRgba(GREEN, 0.5);
      ctx.lineWidth = 2;
      ctx.stroke();
      setFont(ctx, 20, '700');
      ctx.fillStyle = GREEN;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('NODE ' + (i+1), nodeX + nodeW/2, nodeY + 10);
      // sub-items
      const items = ['kubelet', 'kube-proxy', 'runtime'];
      items.forEach((item, j) => {
        setFont(ctx, 15, '400');
        ctx.fillStyle = hexToRgba(TEXT, 0.7);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(item, nodeX + nodeW/2, nodeY + 46 + j*36);
      });
    });
  }

  // Arrows cp → nodes
  if(arrowAlpha > 0 && cpAlpha > 0 && nodeAlpha > 0) {
    ctx.globalAlpha = arrowAlpha * Math.min(cpAlpha, nodeAlpha);
    const arrowYStart = cpY + cpH;
    const arrowYEnd = cy + 20;
    const nodes = [0,1,2];
    nodes.forEach((i) => {
      const nodeX = cx - 360 + i*360;
      const progress = Math.min(1, arrowAlpha * 1.5 - i*0.15);
      if(progress <= 0) return;
      const endY = arrowYStart + progress * (arrowYEnd - arrowYStart);
      ctx.strokeStyle = hexToRgba(ACCENT2, 0.7);
      ctx.lineWidth = 2;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(nodeX, arrowYStart);
      ctx.lineTo(nodeX, endY);
      ctx.stroke();
      ctx.setLineDash([]);
      // arrowhead at end
      if(progress > 0.95) {
        ctx.fillStyle = ACCENT2;
        ctx.beginPath();
        ctx.moveTo(nodeX, arrowYEnd);
        ctx.lineTo(nodeX-7, arrowYEnd-14);
        ctx.lineTo(nodeX+7, arrowYEnd-14);
        ctx.closePath();
        ctx.fill();
      }
    });
  }

  ctx.restore();
}

function renderFrame(frameNum) {
  const t = frameNum / 30;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // Clear
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // === SCENE 1: HOOK (0-8.5s) ===
  const hookEnd = 8.5;
  if(t < hookEnd) {
    // Left column: CONTROL PLANE
    const leftP = ease.spring(seg(t, 0.3, 1.8));
    const leftX = -400 + leftP * 400;
    ctx.save();
    ctx.translate(leftX, 0);

    // Glow bg left
    const gL = ctx.createRadialGradient(480, CY, 0, 480, CY, 380);
    gL.addColorStop(0, hexToRgba(ACCENT, 0.18 * leftP));
    gL.addColorStop(1, hexToRgba(ACCENT, 0));
    ctx.fillStyle = gL;
    ctx.fillRect(0, 0, 960, H);

    // Gear/brain icon placeholder (unicode gear)
    setFont(ctx, 120, '400');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = hexToRgba(ACCENT, 0.9 * leftP);
    ctx.fillText('⚙', 480, CY - 100);

    setFont(ctx, 56, '700');
    ctx.fillStyle = ACCENT;
    ctx.fillText('CONTROL PLANE', 480, CY + 60);

    setFont(ctx, 28, '400');
    ctx.fillStyle = hexToRgba(TEXT, 0.7);
    ctx.fillText('that thinks', 480, CY + 110);
    ctx.restore();

    // Right column: WORKER NODES
    const rightP = ease.spring(seg(t, 0.5, 2.0));
    const rightX = 400 - rightP * 400;
    ctx.save();
    ctx.translate(rightX, 0);

    // Glow bg right
    const gR = ctx.createRadialGradient(1440, CY, 0, 1440, CY, 380);
    gR.addColorStop(0, hexToRgba(GREEN, 0.18 * rightP));
    gR.addColorStop(1, hexToRgba(GREEN, 0));
    ctx.fillStyle = gR;
    ctx.fillRect(960, 0, 960, H);

    setFont(ctx, 120, '400');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = hexToRgba(GREEN, 0.9 * rightP);
    ctx.fillText('🖥', 1440, CY - 100);

    setFont(ctx, 56, '700');
    ctx.fillStyle = GREEN;
    ctx.fillText('WORKER NODES', 1440, CY + 60);

    setFont(ctx, 28, '400');
    ctx.fillStyle = hexToRgba(TEXT, 0.7);
    ctx.fillText('that do', 1440, CY + 110);
    ctx.restore();

    // Dividing line pulse
    const lineP = seg(t, 0.8, 1.5);
    if(lineP > 0) {
      const pulse = 0.5 + 0.5 * Math.sin(t * 4);
      ctx.save();
      ctx.globalAlpha = lineP * (0.5 + 0.4 * pulse);
      ctx.strokeStyle = hexToRgba(ACCENT2, 1);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(CX, CY - 280 * lineP);
      ctx.lineTo(CX, CY + 280 * lineP);
      ctx.stroke();
      ctx.restore();
    }
  }

  // === SCENE 2: CONTROL PLANE COMPONENTS (8.5-56s) ===
  // Fade in at 8.5, fade out at 55.5
  const cpSceneAlpha = ease.out(seg(t, 8.5, 10.5)) * (1 - ease.out(seg(t, 55.5, 57.0)));

  if(cpSceneAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = cpSceneAlpha;

    // Header
    setFont(ctx, 36, '700');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = ACCENT;
    ctx.fillText('CONTROL PLANE', CX, 60);

    const cards = [
      { emoji: '🔌', name: 'kube-apiserver', desc: 'The front door. All API traffic goes here.' },
      { emoji: '💾', name: 'etcd', desc: 'The database. All cluster state lives here. Back it up.' },
      { emoji: '📅', name: 'kube-scheduler', desc: 'Decides which node runs each Pod.' },
      { emoji: '🔄', name: 'kube-controller-manager', desc: 'Watches for drift. Fixes it.' },
      { emoji: '☁', name: 'cloud-controller-manager', desc: 'Cloud integrations. Not present on-prem.' },
    ];

    // Stagger: each card starts appearing 1.5s apart after 9s
    const cardW = 1600, cardH = 80;
    const cardX = CX - cardW/2;
    const cardSpacing = 92;
    const cardStartY = 140;

    cards.forEach((card, i) => {
      const cardT = 9.5 + i * 1.2;
      const cardAlpha = ease.spring(seg(t, cardT, cardT + 0.8));
      const slideY = (1 - ease.spring(seg(t, cardT, cardT + 0.7))) * 40;

      // Highlight currently-spoken card
      const speakTimes = [
        [13.49, 21.72],  // kube-apiserver
        [22.10, 26.82],  // etcd
        [27.20, 36.69],  // scheduler
        [37.07, 48.40],  // controller-manager
        [48.78, 55.82],  // cloud-controller-manager
      ];
      const isActive = t >= speakTimes[i][0] && t <= speakTimes[i][1];

      if(cardAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = cpSceneAlpha * cardAlpha;
        ctx.translate(0, slideY);
        const cy2 = cardStartY + i * cardSpacing;

        // Card bg
        roundRect(ctx, cardX, cy2, cardW, cardH, 12);
        ctx.fillStyle = isActive ? hexToRgba(ACCENT, 0.18) : hexToRgba(CODE_BG, 0.95);
        ctx.fill();

        if(isActive) {
          ctx.strokeStyle = hexToRgba(ACCENT, 0.8);
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        // Left accent bar
        roundRect(ctx, cardX, cy2, 4, cardH, 2);
        ctx.fillStyle = isActive ? ACCENT2 : ACCENT;
        ctx.fill();

        // Emoji
        setFont(ctx, 32, '400');
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = TEXT;
        ctx.fillText(card.emoji, cardX + 20, cy2 + cardH/2);

        // Name
        setFont(ctx, 26, '700');
        ctx.fillStyle = isActive ? ACCENT2 : ACCENT;
        ctx.fillText(card.name, cardX + 72, cy2 + cardH/2 - 13);

        // Desc
        setFont(ctx, 20, '400');
        ctx.fillStyle = TEXT;
        ctx.fillText(card.desc, cardX + 72, cy2 + cardH/2 + 14);

        ctx.restore();
      }
    });
    ctx.restore();
  }

  // === SCENE 3: NODE COMPONENTS (56-76.5s) ===
  const nodeSceneAlpha = ease.out(seg(t, 56.0, 58.0)) * (1 - ease.out(seg(t, 76.0, 77.5)));

  if(nodeSceneAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = nodeSceneAlpha;

    // Header
    setFont(ctx, 36, '700');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = GREEN;
    ctx.fillText('NODE COMPONENTS', CX, 60);

    // Architecture diagram in background
    const diagAlpha = ease.out(seg(t, 57.5, 60.0));
    if(diagAlpha > 0) {
      ctx.save();
      ctx.globalAlpha = nodeSceneAlpha * diagAlpha * 0.4;
      drawArchDiagram(ctx, t, diagAlpha, diagAlpha, diagAlpha * seg(t, 59, 61));
      ctx.restore();
    }

    const ncards = [
      { emoji: '🤖', name: 'kubelet', desc: 'Agent on every node. Keeps containers alive.' },
      { emoji: '🌐', name: 'kube-proxy', desc: 'Network rules. How Services reach Pods.' },
      { emoji: '📦', name: 'container runtime', desc: 'containerd / CRI-O. Actually runs your containers.' },
    ];

    const cardW = 1600, cardH = 90;
    const cardX = CX - cardW/2;
    const cardStartY = CY - 120;
    const cardSpacing = 110;

    const speakTimes = [
      [58.69, 63.68],
      [64.06, 70.12],
      [70.50, 76.15],
    ];

    ncards.forEach((card, i) => {
      const cardT = 56.5 + i * 1.2;
      const cardAlpha = ease.spring(seg(t, cardT, cardT + 0.8));
      const slideY = (1 - ease.spring(seg(t, cardT, cardT + 0.7))) * 40;
      const isActive = t >= speakTimes[i][0] && t <= speakTimes[i][1];

      if(cardAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = nodeSceneAlpha * cardAlpha;
        ctx.translate(0, slideY);
        const cy2 = cardStartY + i * cardSpacing;

        roundRect(ctx, cardX, cy2, cardW, cardH, 12);
        ctx.fillStyle = isActive ? hexToRgba(GREEN, 0.15) : hexToRgba(CODE_BG, 0.95);
        ctx.fill();
        if(isActive) {
          ctx.strokeStyle = hexToRgba(GREEN, 0.7);
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
        roundRect(ctx, cardX, cy2, 4, cardH, 2);
        ctx.fillStyle = isActive ? GREEN : hexToRgba(GREEN, 0.6);
        ctx.fill();

        setFont(ctx, 36, '400');
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = TEXT;
        ctx.fillText(card.emoji, cardX + 20, cy2 + cardH/2);

        setFont(ctx, 28, '700');
        ctx.fillStyle = isActive ? GREEN : hexToRgba(GREEN, 0.85);
        ctx.fillText(card.name, cardX + 80, cy2 + cardH/2 - 15);

        setFont(ctx, 22, '400');
        ctx.fillStyle = TEXT;
        ctx.fillText(card.desc, cardX + 80, cy2 + cardH/2 + 16);

        ctx.restore();
      }
    });
    ctx.restore();
  }

  // === SCENE 5: PAYOFF (76.5-81.3s) ===
  const payoffAlpha = ease.out(seg(t, 76.5, 78.0)) * (1 - ease.out(seg(t, 81.0, 82.0)));

  if(payoffAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = payoffAlpha;

    // K8s logo pulse
    const logoImg = document.getElementById('k8sLogo');
    const logoSize = 160 + 20 * Math.sin(t * 3);
    const logoAlpha = ease.out(seg(t, 76.5, 78.5));
    if(logoImg.complete && logoImg.naturalWidth > 0) {
      ctx.save();
      ctx.globalAlpha = payoffAlpha * logoAlpha;
      ctx.drawImage(logoImg, CX - logoSize/2, CY - 260, logoSize, logoSize);
      ctx.restore();
    }

    // Glow under logo
    const glow = ctx.createRadialGradient(CX, CY - 190, 0, CX, CY - 190, 160);
    glow.addColorStop(0, hexToRgba(ACCENT, 0.25 * logoAlpha));
    glow.addColorStop(1, hexToRgba(ACCENT, 0));
    ctx.fillStyle = glow;
    ctx.fillRect(CX - 200, CY - 380, 400, 400);

    setFont(ctx, 64, '700');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = TEXT;
    const line1P = ease.out(seg(t, 77.0, 78.0));
    ctx.globalAlpha = payoffAlpha * line1P;
    ctx.fillText('Every cluster runs these pieces.', CX, CY + 30);

    const line2P = ease.out(seg(t, 78.0, 79.2));
    ctx.globalAlpha = payoffAlpha * line2P;
    setFont(ctx, 48, '400');
    ctx.fillStyle = hexToRgba(ACCENT2, 0.9);
    ctx.fillText('Now you know what they do.', CX, CY + 110);

    ctx.restore();
  }

  // === SCENE 6: OUTRO (81.3-89.3s) ===
  const outroAlpha = ease.out(seg(t, 81.3, 83.0));

  if(outroAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = outroAlpha;

    // Brand glow
    const bgGlow = ctx.createRadialGradient(CX, CY, 0, CX, CY, 500);
    bgGlow.addColorStop(0, hexToRgba(ACCENT, 0.15));
    bgGlow.addColorStop(1, hexToRgba(ACCENT, 0));
    ctx.fillStyle = bgGlow;
    ctx.fillRect(0, 0, W, H);

    // "Run the Docs"
    setFont(ctx, 72, '700');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = TEXT;
    ctx.fillText('Run the Docs', CX, CY - 100);

    // Label
    setFont(ctx, 32, '400');
    ctx.fillStyle = hexToRgba(ACCENT2, 0.9);
    ctx.fillText('kubernetes · cluster components', CX, CY - 30);

    // URL pills
    const pillY1 = CY + 60;
    const pillY2 = CY + 130;
    const pill1Text = 'kubernetes.io/docs/concepts/architecture/';
    const pill2Text = 'github.com/run-the-docs/kubernetes';

    // Pill 1
    ctx.save();
    ctx.globalAlpha = outroAlpha * ease.out(seg(t, 82.0, 83.5));
    setFont(ctx, 24, '400');
    const p1W = ctx.measureText(pill1Text).width + 48;
    roundRect(ctx, CX - p1W/2, pillY1 - 20, p1W, 40, 20);
    ctx.fillStyle = hexToRgba(ACCENT, 0.2);
    ctx.fill();
    ctx.strokeStyle = hexToRgba(ACCENT, 0.8);
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = ACCENT2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pill1Text, CX, pillY1);
    ctx.restore();

    // Pill 2
    ctx.save();
    ctx.globalAlpha = outroAlpha * ease.out(seg(t, 82.5, 84.0));
    setFont(ctx, 24, '400');
    const p2W = ctx.measureText(pill2Text).width + 48;
    roundRect(ctx, CX - p2W/2, pillY2 - 20, p2W, 40, 20);
    ctx.fillStyle = hexToRgba(GREEN, 0.15);
    ctx.fill();
    ctx.strokeStyle = hexToRgba(GREEN, 0.8);
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = GREEN;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pill2Text, CX, pillY2);
    ctx.restore();

    ctx.restore();
  }
}

window.renderFrame = renderFrame;
window.setTiming = function(segs, totalDur) {
  TIMING = segs;
  TOTAL_DURATION = totalDur;
};

// Initial render
renderFrame(0);
</script>
</body>
